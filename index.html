const fmt = (n, cur = "$") => `${cur}${(Number(n) || 0).toLocaleString("en-CA", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const inr = (n) => `₹${Math.round(Number(n) || 0).toLocaleString("en-IN")}`;
const monthKey = (d) => (d || "").slice(0, 7);
const thisMonth = () => new Date().toISOString().slice(0, 7);
/* weight-aware unit price: returns {value, per} so 500 g and 1 kg compare fairly */
function unitPrice(it) {
  const q = +it.qty || 1, t = +it.lineTotal || 0;
  switch (it.unit) {
    case "kg": return { value: t / q, per: "kg" };
    case "g": return { value: t / (q / 1000), per: "kg" };
    case "lb": return { value: t / (q * 0.4536), per: "kg" };
    case "L": return { value: t / q, per: "L" };
    case "ml": return { value: t / (q / 1000), per: "L" };
    default: return { value: t / q, per: "ea" };
  }
}

/* ── ONTARIO 2026 TAKE-HOME (verified rates — see Budget tab note) ── */
function ontarioTakeHome(gross, rrsp = 0) {
  const cpp = Math.max(0, Math.min(gross, 74600) - 3500) * 0.0595;
  const cpp2 = Math.max(0, Math.min(gross, 85000) - 74600) * 0.04;
  const ei = Math.min(gross, 68900) * 0.0163;
  const cppEnhDed = Math.max(0, Math.min(gross, 74600) - 3500) * 0.01 + cpp2;
  const cppBaseCr = cpp - Math.max(0, Math.min(gross, 74600) - 3500) * 0.01;
  const taxable = Math.max(0, gross - rrsp - cppEnhDed);
  const bracket = (inc, br) => { let tax = 0, prev = 0;
    for (const [cap, rate] of br) { if (inc <= prev) break; tax += (Math.min(inc, cap) - prev) * rate; prev = cap; } return tax; };
  let bpaF = 16452;
  if (taxable > 258482) bpaF = 14829;
  else if (taxable > 181440) bpaF = 16452 - 1623 * (taxable - 181440) / 77042;
  const fed = Math.max(0, bracket(taxable, [[58523, .14], [117045, .205], [181440, .26], [258482, .29], [Infinity, .33]])
    - (bpaF + Math.min(1501, gross) + cppBaseCr + ei) * 0.14);
  const onBasic = Math.max(0, bracket(taxable, [[53891, .0505], [107785, .0915], [150000, .1116], [220000, .1216], [Infinity, .1316]])
    - (12989 + cppBaseCr + ei) * 0.0505);
  const surtax = Math.max(0, onBasic - 5818) * 0.2 + Math.max(0, onBasic - 7446) * 0.36;
  let ohp = 0; const ti = taxable;
  if (ti > 200000) ohp = Math.min(900, 750 + (ti - 200000) * .25);
  else if (ti > 72000) ohp = Math.min(750, 600 + (ti - 72000) * .25);
  else if (ti > 48000) ohp = Math.min(600, 450 + (ti - 48000) * .25);
  else if (ti > 36000) ohp = Math.min(450, 300 + (ti - 36000) * .06);
  else if (ti > 20000) ohp = Math.min(300, (ti - 20000) * .06);
  const on = onBasic + surtax + ohp;
  const net = gross - rrsp - fed - on - cpp - cpp2 - ei;
  return { fed, on, surtax, ohp, cpp: cpp + cpp2, ei, net, monthly: net / 12, biweekly: net / 26 };
}

/* ── STORAGE (migrates FinLedger data automatically) ── */
const KEY = "lakshmi-v1";
const emptyData = {
  expenses: [], fuel: [], budgets: {}, recurring: [],
  settings: { salary: 85000, rrsp: 0, payFreq: "biweekly", incomes: [], indiaMonthlyINR: 0, inrRate: 62, savingsGoal: 1000, pin: "" },
};
/* frequency → monthly-equivalent multiplier (52 weeks / 26 bi-weeks per year) */
const FREQ = { weekly: 52 / 12, biweekly: 26 / 12, monthly: 1, yearly: 1 / 12 };
const FREQ_LABEL = { weekly: "weekly", biweekly: "bi-weekly", monthly: "monthly", yearly: "yearly" };
const incomesMonthly = (settings) => (settings.incomes || []).reduce((a, s) => a + (+s.amount || 0) * (FREQ[s.freq] || 1), 0);
async function loadData() {
  for (const k of [KEY, "finledger-v2", "finledger-v1"]) {
    try {
      const raw = localStorage.getItem(k);
      if (raw) {
        const d = JSON.parse(raw);
        const settings = { ...emptyData.settings, ...d.settings };
        if (!settings.incomes) settings.incomes = [];
        if (+settings.familyIncome > 0 && !settings.incomes.length)
          settings.incomes = [{ id: crypto.randomUUID(), name: "Family income", amount: +settings.familyIncome, freq: "monthly" }];
        delete settings.familyIncome;
        return { ...emptyData, ...d, settings };
      }
    } catch {}
  }
  return emptyData;
}
async function saveData(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch (e) { console.error(e); } }

/* post any recurring expenses not yet logged this month */
function applyRecurring(data) {
  const mk = thisMonth();
  let changed = false;
  const expenses = [...data.expenses];
  const recurring = data.recurring.map(r => {
    if (r.lastPosted === mk) return r;
    expenses.unshift({ id: crypto.randomUUID(), store: r.store, date: `${mk}-01`, category: r.category,
      total: r.total, tax: 0, subtotal: r.total, items: [], source: "recurring" });
    changed = true;
    return { ...r, lastPosted: mk };
  });
  return changed ? { ...data, expenses, recurring } : data;
}

/* ── AI (text + vision via in-app API) ── */
const IMPORT_SCHEMA = `{"store":"","date":"YYYY-MM-DD","category":"<one of: ${CATS.join(", ")}>","subtotal":0,"tax":0,"total":0,"litres":0,"items":[{"name":"","qty":1,"unit":"ea|kg|g|lb|L|ml","lineTotal":0}]}`;
/* ── AI: your own key, your choice of brain (OpenAI = ChatGPT's engine, or Claude) ── */
const AI_KEY = "lakshmi-ai";
const getAI = () => { try { return JSON.parse(localStorage.getItem(AI_KEY)) || {}; } catch { return {}; } };
const setAI = (cfg) => localStorage.setItem(AI_KEY, JSON.stringify(cfg));
async function askAI(content, maxTokens = 1000) {
  const { provider = "openai", key = "" } = getAI();
  if (!key) throw new Error("Add your AI key first: tap the gear icon → AI for bill reading");
  if (provider === "openai") {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${key}` },
      body: JSON.stringify({
        model: "gpt-4o-mini", max_tokens: maxTokens,
        messages: [{ role: "user", content: content.map(b => b.type === "image"
          ? { type: "image_url", image_url: { url: `data:${b.source.media_type};base64,${b.source.data}` } }
          : { type: "text", text: b.text }) }],
      }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message || "OpenAI error");
    return d.choices?.[0]?.message?.content || "";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key,
      "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: maxTokens,
      messages: [{ role: "user", content }] }),
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message || "Anthropic error");
  return (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}
async function analyzeBill(base64) {
  const text = await askAI([
    { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
    { type: "text", text: `Read this receipt. Respond ONLY with raw JSON, no fences:\n${IMPORT_SCHEMA}\nRules: ISO date (today if unreadable); tax = HST/GST/PST summed; category = best fit; fuel receipts → category "Fuel" with litres; grocery items with weights → use unit kg/g/lb and qty as the weight number; plain numbers.` },
  ]);
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}
async function fileToJpegBase64(file, maxDim = 1600) {
  const url = URL.createObjectURL(file);
  try {
    const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = () => rej(new Error("decode")); i.src = url; });
    const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    return c.toDataURL("image/jpeg", 0.85).split(",")[1];
  } finally { URL.revokeObjectURL(url); }
}

/* ── RECEIPT REVIEW (kept — the signature moment) ── */
function ReceiptCard({ draft, setDraft, onSave, onDiscard }) {
  const upd = (k, v) => setDraft({ ...draft, [k]: v });
  const updItem = (i, k, v) => setDraft({ ...draft, items: draft.items.map((it, j) => j === i ? { ...it, [k]: v } : it) });
  const isFuel = draft.category === "Fuel";
  const pin = { background: "transparent", border: "none", borderBottom: "1px dotted #C9C0AA", fontFamily: "inherit", fontSize: 13, outline: "none", color: "inherit" };
  const zig = `linear-gradient(-45deg, transparent 70%, ${T.bg} 0) 0 0/14px 14px repeat-x, linear-gradient(45deg, transparent 70%, ${T.bg} 0) 0 0/14px 14px repeat-x`;
  return (
    <div style={{ background: "#F4EFE2", color: "#26221A", borderRadius: "6px 6px 0 0", fontFamily: "ui-monospace,Menlo,monospace", boxShadow: "0 16px 40px rgba(0,0,0,.5)" }}>
      <div style={{ padding: "18px 16px 8px", textAlign: "center", borderBottom: "1px dashed #A79F8C" }}>
        <input value={draft.store} onChange={e => upd("store", e.target.value)}
          style={{ background: "transparent", border: "none", textAlign: "center", fontFamily: "inherit", fontSize: 17, fontWeight: 700, width: "100%", outline: "none", color: "inherit" }} />
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 6, flexWrap: "wrap" }}>
          <input type="date" value={draft.date} onChange={e => upd("date", e.target.value)}
            style={{ background: "transparent", border: "1px dashed #A79F8C", borderRadius: 4, fontFamily: "inherit", fontSize: 12, padding: "2px 6px", color: "inherit" }} />
          <select value={draft.category} onChange={e => upd("category", e.target.value)}
            style={{ background: "transparent", border: "1px dashed #A79F8C", borderRadius: 4, fontFamily: "inherit", fontSize: 12, color: "inherit" }}>
            {CATS.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div style={{ padding: "10px 16px" }}>
        {draft.items.map((it, i) => (
          <div key={i} style={{ display: "flex", gap: 5, alignItems: "center", padding: "4px 0", fontSize: 13 }}>
            <input value={it.name} onChange={e => updItem(i, "name", e.target.value)} style={{ ...pin, flex: 1, minWidth: 0 }} />
            <input value={it.qty} onChange={e => updItem(i, "qty", e.target.value)} inputMode="decimal" style={{ ...pin, width: 34, textAlign: "right" }} />
            <select value={it.unit || "ea"} onChange={e => updItem(i, "unit", e.target.value)}
              style={{ background: "transparent", border: "none", fontFamily: "inherit", fontSize: 11, color: "#7A7260" }}>
              {UNITS.map(u => <option key={u}>{u}</option>)}
            </select>
            <input value={it.lineTotal} onChange={e => updItem(i, "lineTotal", e.target.value)} inputMode="decimal" style={{ ...pin, width: 56, textAlign: "right" }} />
            <button onClick={() => setDraft({ ...draft, items: draft.items.filter((_, j) => j !== i) })}
              style={{ background: "none", border: "none", cursor: "pointer", color: "#A05A48", padding: 2 }}><Trash2 size={14} /></button>
          </div>))}
        <button onClick={() => setDraft({ ...draft, items: [...draft.items, { name: "", qty: 1, unit: "ea", lineTotal: 0 }] })}
          style={{ background: "none", border: "1px dashed #A79F8C", borderRadius: 4, fontFamily: "inherit", fontSize: 12, padding: "4px 10px", marginTop: 6, cursor: "pointer", color: "inherit" }}>+ item</button>
        {isFuel && (
          <div style={{ borderTop: "1px dashed #A79F8C", marginTop: 10, paddingTop: 8, fontSize: 13 }}>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "2px 0" }}>
              <span>LITRES</span>
              <input value={draft.litres} onChange={e => upd("litres", e.target.value)} inputMode="decimal" style={{ ...pin, width: 80, textAlign: "right" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "2px 0" }}>
              <span>ODOMETER (km)</span>
              <input value={draft.odometer} onChange={e => upd("odometer", e.target.value)} inputMode="numeric" placeholder="enter now" style={{ ...pin, width: 100, textAlign: "right" }} />
            </div>
          </div>)}
        <div style={{ borderTop: "1px dashed #A79F8C", marginTop: 10, paddingTop: 8, fontSize: 13 }}>
          {["subtotal", "tax", "total"].map(k => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "2px 0", fontWeight: k === "total" ? 700 : 400 }}>

      </div>
      <div style={{ height: 14, background: zig }} />
    </div>
  );
}

/* ── ADD TAB (scan / paste / manual / recurring / Siri guide) ── */
function AddTab({ data, persist }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [draft, setDraft] = useState(null);
  const [importText, setImportText] = useState("");
  const [importErr, setImportErr] = useState("");
  const [showManual, setShowManual] = useState(false);
  const [showSiri, setShowSiri] = useState(false);

  const toDraft = (p) => setDraft({
    store: p.store || "Unknown store",
    date: p.date || new Date().toISOString().slice(0, 10),
    category: CATS.includes(p.category) ? p.category : "Other",
    subtotal: p.subtotal ?? 0, tax: p.tax ?? 0, total: p.total ?? 0,
    litres: p.litres || "", odometer: "",
    items: (Array.isArray(p.items) ? p.items : []).map(it => ({ unit: "ea", ...it })),
  });

  const processImageBlob = async (blob) => {
    setBusy(true); setErr("");
    try {
      let b64; try { b64 = await fileToJpegBase64(blob); } catch { throw new Error("Image couldn't be read — use the paste-code box below instead."); }
      let p; try { p = await analyzeBill(b64); } catch (a) { throw new Error(`AI step failed (${String(a.message || a).slice(0, 80)}) — use the paste-code box below.`); }
      toDraft(p);
    } catch (ex) { setErr(String(ex.message || ex)); }
    setBusy(false);
  };

  const onFile = async (e) => {
    const file = e.target.files?.[0]; e.target.value = "";
    if (file) await processImageBlob(file);
  };

  const pastePhoto = async () => {
    setErr("");
    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const type = item.types.find(t => t.startsWith("image/"));
        if (type) { await processImageBlob(await item.getType(type)); return; }
      }
      setErr("No photo on the clipboard. In Photos: open the bill photo → Share → Copy Photo, then tap this again.");
    } catch {
      setErr("Clipboard access was blocked here — allow it when asked, or use the paste-code box below.");
    }
  };

  const tryImport = () => {
    setImportErr("");
    try { toDraft(JSON.parse(importText.trim())); setImportText(""); }
    catch { setImportErr("Not a valid import code — paste exactly what Claude or your Siri shortcut produced."); }
  };

  const save = () => {
    const exp = { id: crypto.randomUUID(), store: draft.store, date: draft.date, category: draft.category,
      subtotal: +draft.subtotal || 0, tax: +draft.tax || 0, total: +draft.total || 0,
      items: draft.items.filter(it => it.name).map(it => ({ name: it.name, qty: +it.qty || 1, unit: it.unit || "ea", lineTotal: +it.lineTotal || 0 })),
      source: "scan" };
    let fuel = data.fuel;
    if (draft.category === "Fuel" && +draft.litres > 0)
      fuel = [...fuel, { id: crypto.randomUUID(), date: draft.date, odometer: +draft.odometer || 0, litres: +draft.litres, cost: +draft.total || 0, fromScan: true }];
    persist({ ...data, expenses: [exp, ...data.expenses], fuel });
    setDraft(null);
  };

  if (draft) return <ReceiptCard draft={draft} setDraft={setDraft} onSave={save} onDiscard={() => setDraft(null)} />;

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card style={{ textAlign: "center", padding: 24 }}>
        <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 4 }}>{busy ? "Reading your bill…" : "Add a bill"}</div>
        <div style={{ fontSize: 13, color: T.dim, marginBottom: 16 }}>
          {busy ? "Extracting items, weights, tax, totals" : "Every item, weight and tax captured — feeding your dashboard and price comparisons."}
        </div>
        <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
          <label style={{ position: "relative", display: "inline-flex", alignItems: "center", gap: 8, background: busy ? T.surface2 : T.amber, color: busy ? T.dim : "#1A1408", borderRadius: 12, padding: "12px 16px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
            {busy ? <Loader2 size={16} /> : <Camera size={16} />} Camera
            <input type="file" accept="image/*" capture="environment" onChange={onFile} disabled={busy}

function ManualForm({ onSave, inrRate }) {
  const [f, setF] = useState({ store: "", date: new Date().toISOString().slice(0, 10), category: "Groceries", total: "", tax: "", currency: "CAD", recurring: false });
  const [items, setItems] = useState([]);
  const itemsSum = items.reduce((a, it) => a + (+it.lineTotal || 0), 0);
  const effTotal = +f.total || (itemsSum ? +(itemsSum + (+f.tax || 0)).toFixed(2) : 0);
  const cadTotal = f.currency === "INR" ? effTotal / inrRate : effTotal;
  const updItem = (i, k, v) => setItems(items.map((it, j) => j === i ? { ...it, [k]: v } : it));
  return (
    <div style={{ display: "grid", gap: 10, marginTop: 14 }}>
      <Input placeholder="Store / payee" value={f.store} onChange={e => setF({ ...f, store: e.target.value })} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Input type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })} />
        <Select value={f.category} onChange={e => setF({ ...f, category: e.target.value })}>{CATS.map(c => <option key={c}>{c}</option>)}</Select>
      </div>
      <div>
        <div style={{ fontSize: 12, color: T.dim, marginBottom: 5 }}>Items (optional — powers price comparison)</div>
        {items.map((it, i) => (
          <div key={i} style={{ display: "flex", gap: 5, marginBottom: 6 }}>
            <Input placeholder="tomatoes" value={it.name} onChange={e => updItem(i, "name", e.target.value)} style={{ flex: 2, padding: "9px 10px", fontSize: 13 }} />
            <Input placeholder="qty" inputMode="decimal" value={it.qty} onChange={e => updItem(i, "qty", e.target.value)} style={{ width: 48, padding: "9px 6px", fontSize: 13 }} />
            <Select value={it.unit} onChange={e => updItem(i, "unit", e.target.value)} style={{ width: 60, padding: "9px 4px", fontSize: 13 }}>
              {UNITS.map(u => <option key={u}>{u}</option>)}
            </Select>
            <Input placeholder="$" inputMode="decimal" value={it.lineTotal} onChange={e => updItem(i, "lineTotal", e.target.value)} style={{ width: 62, padding: "9px 6px", fontSize: 13 }} />
            <button onClick={() => setItems(items.filter((_, j) => j !== i))}
              style={{ background: "none", border: "none", color: T.dim, cursor: "pointer" }}><Trash2 size={15} /></button>
          </div>))}
        <Btn tone="ghost" onClick={() => setItems([...items, { name: "", qty: 1, unit: "ea", lineTotal: "" }])} style={{ padding: "8px 12px", fontSize: 13 }}>
          <Plus size={14} /> Add item</Btn>
        {itemsSum > 0 && <span style={{ fontSize: 12, color: T.dim, marginLeft: 10 }}>items {fmt(itemsSum)}</span>}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
        <Select value={f.currency} onChange={e => setF({ ...f, currency: e.target.value })}><option>CAD</option><option>INR</option></Select>
        <Input placeholder={`Total ${f.currency === "INR" ? "₹" : "$"}${itemsSum ? " (auto)" : ""}`} inputMode="decimal" value={f.total} onChange={e => setF({ ...f, total: e.target.value })} />
        <Input placeholder="Tax $" inputMode="decimal" value={f.tax} onChange={e => setF({ ...f, tax: e.target.value })} />
      </div>
      {f.currency === "INR" && effTotal > 0 && <div style={{ fontSize: 12, color: T.dim }}>≈ {fmt(cadTotal)} CAD at rate {inrRate}</div>}
      <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: T.dim }}>
        <input type="checkbox" checked={f.recurring} onChange={e => setF({ ...f, recurring: e.target.checked })} />
        Repeat monthly (rent, mortgage, subscriptions — auto-logged on the 1st)
      </label>
      <Btn disabled={!f.store || !effTotal} onClick={() => { onSave({
        id: crypto.randomUUID(), store: f.store, date: f.date, category: f.category,
        total: +cadTotal.toFixed(2), tax: +f.tax || 0, subtotal: +(cadTotal - (+f.tax || 0)).toFixed(2),
        items: items.filter(it => it.name && +it.lineTotal).map(it => ({ name: it.name, qty: +it.qty || 1, unit: it.unit || "ea", lineTotal: +it.lineTotal })),
        source: "manual", ...(f.currency === "INR" ? { origINR: effTotal } : {}) }, f.recurring); setItems([]); }}>
        <Plus size={16} /> Save expense
      </Btn>
    </div>
  );
}

/* ── DASHBOARD (with computed intelligence + optional AI narrative) ── */
function DashboardTab({ data }) {
  const now = thisMonth();
  const last = new Date(new Date().setMonth(new Date().getMonth() - 1)).toISOString().slice(0, 7);
  const [aiText, setAiText] = useState("");
  const [aiBusy, setAiBusy] = useState(false);

  const byMonth = useMemo(() => {
    const m = {};
    data.expenses.forEach(e => { const k = monthKey(e.date); m[k] = m[k] || { spend: 0, tax: 0, cats: {} };
      m[k].spend += e.total; m[k].tax += e.tax; m[k].cats[e.category] = (m[k].cats[e.category] || 0) + e.total; });
    return m;
  }, [data.expenses]);
  const cur = byMonth[now] || { spend: 0, tax: 0, cats: {} };
  const prev = byMonth[last] || { spend: 0, cats: {} };
  const months = Object.keys(byMonth).sort().slice(-6);
  const trend = months.map(k => ({ m: k.slice(5) + "/" + k.slice(2, 4), spend: +byMonth[k].spend.toFixed(2) }));
  const catData = Object.entries(cur.cats).map(([name, value]) => ({ name, value: +value.toFixed(2) })).sort((a, b) => b.value - a.value);

  /* computed intelligence */
  const insights = useMemo(() => {
    const out = [];
    const day = new Date().getDate();
    const daysIn = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
    if (cur.spend > 0) {
      const burn = cur.spend / day, projected = burn * daysIn;
      out.push({ icon: "🔥", text: `Daily burn ${fmt(burn)} → month-end projection ${fmt(projected)}${prev.spend ? ` (last month ${fmt(prev.spend)})` : ""}.` });
    }
    let jump = null;
    Object.entries(cur.cats).forEach(([c, v]) => {
      const p = prev.cats[c] || 0;
      if (p > 20 && v > p * 1.4 && (!jump || v - p > jump.d)) jump = { c, d: v - p, v, p };
    });
    if (jump) out.push({ icon: "📈", text: `${jump.c} is up ${fmt(jump.d)} vs last month (${fmt(jump.p)} → ${fmt(jump.v)}).` });
    const taxYTD = Object.entries(byMonth).filter(([k]) => k.startsWith(now.slice(0, 4))).reduce((a, [, v]) => a + v.tax, 0);
    if (taxYTD > 0) out.push({ icon: "🧾", text: `Sales tax paid this year: ${fmt(taxYTD)}.` });
    const big = data.expenses.filter(e => monthKey(e.date) === now).sort((a, b) => b.total - a.total)[0];
    if (big) out.push({ icon: "💸", text: `Biggest bill this month: ${big.store} ${fmt(big.total)} (${big.category}).` });
    return out;
  }, [byMonth, cur, prev, data.expenses, now]);

  const aiInsights = async () => {
    setAiBusy(true); setAiText("");
    try {
      const summary = months.map(k => `${k}: total ${byMonth[k].spend.toFixed(0)}, ` +
        Object.entries(byMonth[k].cats).map(([c, v]) => `${c} ${v.toFixed(0)}`).join(", ")).join("\n");
      const text = await askAI([{ type: "text", text:
        `You are a sharp personal-finance analyst. Monthly spending data (CAD):\n${summary}\nGive exactly 3 short, specific observations with actionable advice. Plain text, no markdown, max 90 words total.` }], 400);
      setAiText(text.trim());
    } catch { setAiText("AI insights unavailable right now — the computed insights above still apply."); }
    setAiBusy(false);
  };

  if (!data.expenses.length) return <Card style={{ textAlign: "center", padding: 32 }}>
    <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>Your ledger is empty</div>
    <div style={{ fontSize: 13, color: T.dim }}>Add your first bill — the dashboard builds itself from there.</div></Card>;

  const delta = prev.spend ? ((cur.spend - prev.spend) / prev.spend) * 100 : 0;
  const th = ontarioTakeHome(+data.settings.salary || 0, +data.settings.rrsp || 0);
  const inflow = th.monthly + incomesMonthly(data.settings);
  const indiaCAD = (+data.settings.indiaMonthlyINR || 0) / (+data.settings.inrRate || 1);
  const saved = inflow - cur.spend - indiaCAD;
  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", textAlign: "center" }}>
          <div><Label>In</Label><Num size={18} color={T.green}>{fmt(inflow)}</Num></div>
          <div><Label>Spent</Label><Num size={18} color={T.amber}>{fmt(cur.spend)}</Num></div>
          <div><Label>Saved</Label><Num size={18} color={saved >= 0 ? T.green : T.red}>{fmt(saved)}</Num></div>
        </div>
        <div style={{ fontSize: 11, color: T.dim, textAlign: "center", marginTop: 8 }}>
          This month · household income − spending − India commitments
        </div>
      </Card>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Card><Label>This month</Label><Num color={T.amber}>{fmt(cur.spend)}</Num>
          <div style={{ fontSize: 12, color: delta > 0 ? T.red : T.green, display: "flex", alignItems: "center", gap: 4, marginTop: 4 }}>
            {delta > 0 ? <TrendingUp size={13} /> : <TrendingDown size={13} />}{Math.abs(delta).toFixed(0)}% vs last</div></Card>
        <Card><Label>Tax paid</Label><Num>{fmt(cur.tax)}</Num>
          <div style={{ fontSize: 12, color: T.dim, marginTop: 4 }}>{data.expenses.filter(e => monthKey(e.date) === now).length} bills this month</div></Card>
      </div>

      <Card>
        <Label>Insights</Label>
        {insights.map((ins, i) => (
          <div key={i} style={{ display: "flex", gap: 10, fontSize: 13.5, padding: "6px 0", lineHeight: 1.5 }}>
            <span>{ins.icon}</span><span>{ins.text}</span>
          </div>))}
        <Btn tone="ghost" onClick={aiInsights} disabled={aiBusy} style={{ marginTop: 8, padding: "9px 14px", fontSize: 13 }}>
          {aiBusy ? <Loader2 size={14} style={{ animation: "spin 1s linear infinite" }} /> : <Sparkles size={14} color={T.amber} />} Deeper AI read
        </Btn>
        {aiText && <div style={{ fontSize: 13.5, marginTop: 10, padding: 12, background: T.surface2, borderRadius: 10, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{aiText}</div>}
      </Card>

      <Card>
        <Label>Trend</Label>
        <ResponsiveContainer width="100%" height={160}>
          <LineChart data={trend} margin={{ top: 8, right: 8, left: -18, bottom: 0 }}>
            <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
            <XAxis dataKey="m" stroke={T.dim} fontSize={11} /><YAxis stroke={T.dim} fontSize={11} />
            <Tooltip contentStyle={tipStyle} />
            <Line type="monotone" dataKey="spend" stroke={T.amber} strokeWidth={2.5} dot={{ fill: T.amber, r: 3 }} />
          </LineChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <Label>Where it went · {now}</Label>
        <div style={{ display: "flex", alignItems: "center" }}>
          <ResponsiveContainer width="45%" height={150}>
            <PieChart><Pie data={catData} dataKey="value" innerRadius={38} outerRadius={62} paddingAngle={2}>
              {catData.map((c, i) => <Cell key={i} fill={catColor(c.name)} stroke="none" />)}</Pie>
              <Tooltip contentStyle={tipStyle} /></PieChart>
          </ResponsiveContainer>
          <div style={{ flex: 1, display: "grid", gap: 6 }}>
            {catData.slice(0, 6).map(c => (
              <div key={c.name} style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: catColor(c.name) }} />{c.name}</span>
                <span style={{ fontFamily: "ui-monospace,monospace" }}>{fmt(c.value)}</span>
              </div>))}
          </div>
        </div>
      </Card>
    </div>
  );
}

function LedgerTab({ data, persist }) {

/* ── PRICES (weight-aware: compares $/kg, $/L, $/ea) ── */
function PricesTab({ data }) {
  const rows = useMemo(() => {
    const norm = (s) => (s || "").toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
    const m = {};
    data.expenses.forEach(e => (e.items || []).forEach(it => {
      const k = norm(it.name); if (!k) return;
      const up = unitPrice(it); if (!up.value || !isFinite(up.value)) return;
      m[k] = m[k] || { name: it.name, per: up.per, stores: {} };
      (m[k].stores[e.store] = m[k].stores[e.store] || []).push({ price: up.value, date: e.date });
    }));
    return Object.values(m)
      .map(r => ({ ...r, entries: Object.entries(r.stores).map(([store, prices]) => ({
          store, n: prices.length, price: prices.sort((a, b) => b.date.localeCompare(a.date))[0].price,
        })).sort((a, b) => a.price - b.price) }))
      .filter(r => r.entries.length >= 2)
      .map(r => ({ ...r, save: ((r.entries.at(-1).price - r.entries[0].price) / r.entries.at(-1).price) * 100 }))
      .sort((a, b) => b.save - a.save);
  }, [data.expenses]);
  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card style={{ padding: 14 }}>
        <div style={{ fontWeight: 600, marginBottom: 2 }}>Store rate card</div>
        <div style={{ fontSize: 12, color: T.dim }}>Weight-aware comparison — 500 g at one store vs 1 kg at another still compares fairly, per kg.</div>
      </Card>
      {rows.length === 0 && <Card style={{ textAlign: "center", color: T.dim, fontSize: 13, padding: 24 }}>
        Once the same item (e.g. "tomatoes") appears on bills from two stores, the cheaper store gets flagged here — by $/kg for weighed goods.</Card>}
      {rows.map(r => (
        <Card key={r.name} style={{ padding: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
            <span style={{ fontWeight: 600, textTransform: "capitalize" }}>{r.name} <span style={{ color: T.dim, fontWeight: 400, fontSize: 12 }}>per {r.per}</span></span>
            {r.save > 1 && <span style={{ fontSize: 12, color: T.green, fontWeight: 600 }}>save {r.save.toFixed(0)}%</span>}
          </div>
          {r.entries.map((s, i) => (
            <div key={s.store} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "5px 0", color: i === 0 ? T.green : T.paper }}>
              <span>{i === 0 ? "✓ " : ""}{s.store} <span style={{ color: T.dim }}>×{s.n}</span></span>
              <span style={{ fontFamily: "ui-monospace,monospace" }}>{fmt(s.price)}/{r.per}</span>
            </div>))}
        </Card>))}
    </div>
  );
}

/* ── BUDGET & INCOME (segmented: set income once, budgets separately) ── */
function BudgetTab({ data, persist }) {
  const [view, setView] = useState("income");
  const s = data.settings;
  const th = useMemo(() => ontarioTakeHome(+s.salary || 0, +s.rrsp || 0), [s.salary, s.rrsp]);
  const now = thisMonth();
  const actuals = useMemo(() => {
    const m = {}; data.expenses.filter(e => monthKey(e.date) === now).forEach(e => m[e.category] = (m[e.category] || 0) + e.total); return m;
  }, [data.expenses, now]);
  const setS = (k, v) => persist({ ...data, settings: { ...s, [k]: v } });
  const setBudget = (c, v) => persist({ ...data, budgets: { ...data.budgets, [c]: +v || 0 } });
  const inrRate = +s.inrRate || 1;
  const indiaCAD = (+s.indiaMonthlyINR || 0) / inrRate;
  const myPay = s.payFreq === "weekly" ? th.net / 52 : s.payFreq === "monthly" ? th.monthly : th.biweekly;
  const household = th.monthly + incomesMonthly(s);
  const totalBudget = Object.values(data.budgets).reduce((a, b) => a + b, 0);
  const projSavings = household - totalBudget - indiaCAD;
  const monthSpend = Object.values(actuals).reduce((a, b) => a + b, 0);
  const actualSavings = household - monthSpend - indiaCAD;
  const goal = +s.savingsGoal || 0;
  const monthlyBase = Math.max(0, projSavings);
  const proj = Array.from({ length: 12 }, (_, i) => ({
    m: new Date(new Date().setMonth(new Date().getMonth() + i + 1)).toLocaleString("en", { month: "short" }),
    projected: +(monthlyBase * (i + 1)).toFixed(0), goal: +(goal * (i + 1)).toFixed(0),
  }));
  const addIncome = () => setS("incomes", [...(s.incomes || []), { id: crypto.randomUUID(), name: "", amount: "", freq: "biweekly" }]);
  const updIncome = (id, k, v) => setS("incomes", s.incomes.map(x => x.id === id ? { ...x, [k]: v } : x));
  const rmIncome = (id) => setS("incomes", s.incomes.filter(x => x.id !== id));
  const FlowRow = ({ label, value, color, bold }) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 14, fontWeight: bold ? 700 : 400, borderTop: bold ? `1px solid ${T.line}` : "none" }}>
      <span style={{ color: bold ? T.paper : T.dim }}>{label}</span>
      <span style={{ fontFamily: "ui-monospace,monospace", color: color || T.paper }}>{value}</span>
    </div>);
  const seg = (k, label) => (
    <button onClick={() => setView(k)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "none", cursor: "pointer",
      background: view === k ? T.amber : "transparent", color: view === k ? "#1A1408" : T.dim, fontWeight: 600, fontSize: 14 }}>{label}</button>);

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <div style={{ display: "flex", background: T.surface, borderRadius: 12, padding: 4 }}>{seg("income", "Income")}{seg("budgets", "Budgets")}</div>

      {view === "income" && <>
        <Card>
          <Label>Your salary · Ontario 2026 rules</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
            <Field label="Gross salary (CAD/yr)"><Input inputMode="numeric" value={s.salary} onChange={e => setS("salary", e.target.value)} /></Field>
            <Field label="RRSP (CAD/yr)"><Input inputMode="numeric" value={s.rrsp} onChange={e => setS("rrsp", e.target.value)} /></Field>
          </div>
          <Field label="You get paid">
            <Select value={s.payFreq} onChange={e => setS("payFreq", e.target.value)}>
              <option value="weekly">Weekly</option><option value="biweekly">Bi-weekly</option><option value="monthly">Monthly</option>
            </Select>
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
            <div><Label>Net per paycheque</Label><Num color={T.green}>{fmt(myPay)}</Num>
              <div style={{ fontSize: 11, color: T.dim }}>{FREQ_LABEL[s.payFreq]}</div></div>
            <div><Label>Net / month</Label><Num>{fmt(th.monthly)}</Num></div>
          </div>
          <div style={{ marginTop: 12, fontSize: 12, color: T.dim, lineHeight: 1.7, fontFamily: "ui-monospace,monospace" }}>
            Federal {fmt(th.fed)} · Ontario {fmt(th.on)} (surtax {fmt(th.surtax)}, health prem. {fmt(th.ohp)})<br />
            CPP+CPP2 {fmt(th.cpp)} · EI {fmt(th.ei)} → annual net {fmt(th.net)}
          </div>
          <div style={{ marginTop: 8, fontSize: 11, color: T.dim }}>Estimate on verified 2026 rates — confirm payroll-exact figures with CRA's PDOC.</div>
        </Card>

        <Card>
          <Label>Other income sources</Label>
          <div style={{ fontSize: 12, color: T.dim, marginBottom: 10 }}>Wife's pay, cash benefits, rental income, side work — each with its own schedule. Set once; edit anytime.</div>
          {(s.incomes || []).map(src => (
            <div key={src.id} style={{ display: "flex", gap: 6, marginBottom: 8, alignItems: "center" }}>
              <Input placeholder="e.g. Wife's salary" value={src.name} onChange={e => updIncome(src.id, "name", e.target.value)} style={{ flex: 2, padding: "9px 10px", fontSize: 13 }} />
              <Input placeholder="net $" inputMode="decimal" value={src.amount} onChange={e => updIncome(src.id, "amount", e.target.value)} style={{ width: 74, padding: "9px 8px", fontSize: 13 }} />
              <Select value={src.freq} onChange={e => updIncome(src.id, "freq", e.target.value)} style={{ width: 96, padding: "9px 6px", fontSize: 13 }}>
                <option value="weekly">weekly</option><option value="biweekly">bi-weekly</option>
                <option value="monthly">monthly</option><option value="yearly">yearly</option>
              </Select>
              <button onClick={() => rmIncome(src.id)} style={{ background: "none", border: "none", color: T.dim, cursor: "pointer" }}><Trash2 size={15} /></button>
            </div>))}
          <Btn tone="ghost" onClick={addIncome} style={{ padding: "9px 14px", fontSize: 13 }}><Plus size={14} /> Add income source</Btn>
          {incomesMonthly(s) > 0 && <div style={{ fontSize: 12, color: T.dim, marginTop: 8 }}>
            Other income ≈ {fmt(incomesMonthly(s))}/month (weekly ×52, bi-weekly ×26, spread over 12 months)</div>}
        </Card>

        <Card>
          <Label>Monthly money flow</Label>
          <Field label="India commitments (₹/mo)"><Input inputMode="numeric" value={s.indiaMonthlyINR} onChange={e => setS("indiaMonthlyINR", e.target.value)} style={{ marginBottom: 10 }} /></Field>
          <FlowRow label={`Your take-home (${FREQ_LABEL[s.payFreq]} pay)`} value={fmt(th.monthly)} />
          <FlowRow label="+ Other income" value={fmt(incomesMonthly(s))} />
          <FlowRow label="− Budgeted spending" value={`−${fmt(totalBudget)}`} color={T.red} />
          <FlowRow label={`− India (${inr(+s.indiaMonthlyINR || 0)})`} value={`−${fmt(indiaCAD)}`} color={T.red} />
          <FlowRow label="= Projected savings / mo" value={fmt(projSavings)} color={projSavings >= goal ? T.green : T.red} bold />
          <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="Desired savings (/mo)"><Input inputMode="numeric" value={s.savingsGoal} onChange={e => setS("savingsGoal", e.target.value)} /></Field>
            <div><Label>vs goal</Label>
              <Num size={19} color={projSavings >= goal ? T.green : T.red}>{projSavings >= goal ? "+" : ""}{fmt(projSavings - goal)}</Num></div>
          </div>
          <div style={{ marginTop: 10, fontSize: 12, color: actualSavings >= goal ? T.green : T.red }}>
            Actuals: spent {fmt(monthSpend)} this month → real savings pace {fmt(actualSavings)} ({actualSavings >= goal ? "on" : "behind"} goal).
          </div>
        </Card>
      </>}

      {view === "budgets" && <>
        <Card>
          <Label>Budgets vs actuals · {now}</Label>
          <div style={{ fontSize: 12, color: T.dim, marginBottom: 10 }}>Set each category once — they stay until you change them.</div>
          {CATS.map(c => {
            const b = data.budgets[c] || 0, a = actuals[c] || 0;
            if (!b && !a) return (
              <div key={c} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "4px 0", color: T.dim }}>
                <span>{c}</span>
                <input value="" placeholder="set $" inputMode="numeric" onChange={e => setBudget(c, e.target.value)}
                  style={{ width: 60, background: T.surface2, border: "none", borderRadius: 6, color: T.paper, fontSize: 12, padding: "3px 6px", textAlign: "right" }} />
              </div>);
            const pct = b ? Math.min(100, (a / b) * 100) : 0;
            return (
              <div key={c} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
                  <span>{c}</span>
                  <span style={{ fontFamily: "ui-monospace,monospace", color: b && a > b ? T.red : T.dim }}>
                    {fmt(a)} / <input value={b || ""} placeholder="0" inputMode="numeric" onChange={e => setBudget(c, e.target.value)}
                      style={{ width: 56, background: T.surface2, border: "none", borderRadius: 6, color: T.paper, fontSize: 12, padding: "3px 6px", textAlign: "right" }} /></span>
                </div>
                <div style={{ height: 6, background: T.surface2, borderRadius: 3 }}>
                  <div style={{ height: 6, width: `${pct}%`, background: a > b && b ? T.red : catColor(c), borderRadius: 3, transition: "width .3s" }} />
                </div>
              </div>);
          })}
          <div style={{ fontSize: 12, color: T.dim, marginTop: 6 }}>Total budgeted {fmt(totalBudget)} · household income {fmt(household)}/mo</div>
        </Card>

        <Card>
          <Label>12-month savings · CAD & INR</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
            <Field label="CAD→INR"><Input inputMode="decimal" value={s.inrRate} onChange={e => setS("inrRate", e.target.value)} /></Field>
            <div><Label>Year CAD</Label><Num size={17} color={T.green}>{fmt(monthlyBase * 12)}</Num></div>
            <div><Label>Year INR</Label><Num size={17} color={T.amber}>{inr(monthlyBase * 12 * inrRate)}</Num></div>
          </div>
          <ResponsiveContainer width="100%" height={150}>
            <LineChart data={proj} margin={{ top: 4, right: 4, left: -14, bottom: 0 }}>
              <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
              <XAxis dataKey="m" stroke={T.dim} fontSize={10} interval={1} /><YAxis stroke={T.dim} fontSize={10} />
              <Tooltip contentStyle={tipStyle} />
              <Line type="monotone" dataKey="projected" stroke={T.green} strokeWidth={2.5} dot={false} />
              <Line type="monotone" dataKey="goal" stroke={T.amber} strokeWidth={1.5} strokeDasharray="5 4" dot={false} />
            </LineChart>
          </ResponsiveContainer>
          <div style={{ fontSize: 11, color: T.dim, marginTop: 4 }}>Solid: projected from money flow · dashed: goal.</div>
        </Card>
      </>}
    </div>
  );
}

/* ── FUEL ── */
function FuelTab({ data, persist }) {
  const [f, setF] = useState({ date: new Date().toISOString().slice(0, 10), odometer: "", litres: "", cost: "" });
  const [trip, setTrip] = useState({ km: "", price: "" });
  const logs = [...data.fuel].filter(l => l.odometer > 0).sort((a, b) => a.odometer - b.odometer);
  const noOdo = data.fuel.filter(l => !l.odometer);
  const stats = logs.map((l, i) => {
    if (i === 0) return { ...l };
    const km = l.odometer - logs[i - 1].odometer;
    return { ...l, km, kmpl: km > 0 && l.litres ? km / l.litres : null, cpk: km > 0 && l.cost ? l.cost / km : null };
  });
  const withEff = stats.filter(s => s.kmpl);
  const avg = withEff.length ? withEff.reduce((a, s) => a + s.kmpl, 0) / withEff.length : 0;
  const lastPrice = data.fuel.length ? (data.fuel.at(-1).cost / (data.fuel.at(-1).litres || 1)) : 0;
  const tripCost = avg > 0 ? ((+trip.km || 0) / avg) * (+trip.price || lastPrice || 0) : 0;
  const setOdo = (id, v) => persist({ ...data, fuel: data.fuel.map(l => l.id === id ? { ...l, odometer: +v || 0 } : l) });

  return (
    <div style={{ display: "grid", gap: 12 }}>
      {noOdo.length > 0 && <Card style={{ outline: `1px solid ${T.amber}` }}>
        <Label>Scanned fill-ups — add odometer</Label>
        {noOdo.map(l => (
          <div key={l.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, padding: "6px 0" }}>
            <span>{l.date} · {l.litres} L · {fmt(l.cost)}</span>
            <input placeholder="odometer km" inputMode="numeric" onBlur={e => e.target.value && setOdo(l.id, e.target.value)}
              style={{ width: 110, background: T.surface2, border: "none", borderRadius: 8, color: T.paper, fontSize: 13, padding: "7px 9px", textAlign: "right" }} />
          </div>))}
      </Card>}
      <Card>
        <Label>Log a fill-up</Label>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <Input type="date" value={f.date} onChange={e => setF({ ...f, date: e.target.value })} />
          <Input placeholder="Odometer (km)" inputMode="numeric" value={f.odometer} onChange={e => setF({ ...f, odometer: e.target.value })} />
          <Input placeholder="Litres" inputMode="decimal" value={f.litres} onChange={e => setF({ ...f, litres: e.target.value })} />
          <Input placeholder="Cost $" inputMode="decimal" value={f.cost} onChange={e => setF({ ...f, cost: e.target.value })} />
        </div>
        <Btn style={{ marginTop: 10, width: "100%" }} disabled={!+f.odometer || !+f.litres}
          onClick={() => { persist({ ...data, fuel: [...data.fuel, { id: crypto.randomUUID(), date: f.date, odometer: +f.odometer, litres: +f.litres, cost: +f.cost || 0 }] });
            setF({ ...f, odometer: "", litres: "", cost: "" }); }}>
          <Fuel size={16} /> Add fill-up</Btn>
        <div style={{ fontSize: 11, color: T.dim, marginTop: 8 }}>Fuel bills added via scan or paste land here automatically — just add the odometer.</div>
      </Card>
      {withEff.length > 0 && <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Card><Label>Avg mileage</Label><Num color={T.green}>{avg.toFixed(1)} <span style={{ fontSize: 13 }}>km/L</span></Num></Card>
        <Card><Label>Latest cost/km</Label><Num>{fmt(withEff.at(-1).cpk)}</Num></Card>
      </div>}
      <Card>
        <Label>Trip cost estimator</Label>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 8 }}>
          <Field label="Distance (km)"><Input inputMode="numeric" value={trip.km} onChange={e => setTrip({ ...trip, km: e.target.value })} /></Field>
          <Field label={`Fuel $/L ${lastPrice ? `(last ${lastPrice.toFixed(2)})` : ""}`}>
            <Input inputMode="decimal" placeholder={lastPrice ? lastPrice.toFixed(2) : "1.60"} value={trip.price} onChange={e => setTrip({ ...trip, price: e.target.value })} /></Field>
        </div>
        {avg > 0 && +trip.km > 0
          ? <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Route size={18} color={T.amber} />
              <Num size={19} color={T.amber}>{fmt(tripCost)}</Num>
              <span style={{ fontSize: 12, color: T.dim }}>at your avg {avg.toFixed(1)} km/L</span></div>
          : <div style={{ fontSize: 12, color: T.dim }}>Needs your average mileage — log two consecutive fill-ups with odometer readings.</div>}
      </Card>
      {withEff.length > 0 && <Card>
        <Label>Mileage per fill</Label>
        <ResponsiveContainer width="100%" height={150}>
          <LineChart data={withEff.map(s => ({ d: s.date.slice(5), kmpl: +s.kmpl.toFixed(1) }))} margin={{ top: 8, right: 8, left: -18, bottom: 0 }}>
            <CartesianGrid stroke={T.line} strokeDasharray="3 3" />
            <XAxis dataKey="d" stroke={T.dim} fontSize={11} /><YAxis stroke={T.dim} fontSize={11} />
            <Tooltip contentStyle={tipStyle} />
            <Line type="monotone" dataKey="kmpl" stroke={T.green} strokeWidth={2.5} dot={{ fill: T.green, r: 3 }} />
          </LineChart>
        </ResponsiveContainer>
      </Card>}
      {stats.slice().reverse().map(l => (
        <Card key={l.id} style={{ padding: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 13 }}>
            <div style={{ fontWeight: 600 }}>{l.date} · {l.odometer.toLocaleString()} km {l.fromScan && <span style={{ color: T.amber }}>· from bill</span>}</div>
            <div style={{ color: T.dim }}>{l.litres} L · {fmt(l.cost)}{l.kmpl ? ` · ${l.kmpl.toFixed(1)} km/L · ${fmt(l.cpk)}/km` : " · baseline"}</div>
          </div>
          <button onClick={() => persist({ ...data, fuel: data.fuel.filter(x => x.id !== l.id) })}
            style={{ background: "none", border: "none", color: T.dim, cursor: "pointer" }}><Trash2 size={16} /></button>
        </Card>))}
    </div>
  );
}

/* ── PIN LOCK ── */
function PinGate({ pin, onUnlock }) {
  const [entry, setEntry] = useState("");
  const [wrong, setWrong] = useState(false);
  const press = (d) => {
    const next = entry + d;
    if (next.length >= pin.length) {
      if (next === pin) onUnlock();
      else { setWrong(true); setEntry(""); setTimeout(() => setWrong(false), 900); }
    } else setEntry(next);
  };
  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.paper, display: "grid", placeItems: "center", fontFamily: "-apple-system,sans-serif" }}>
      <div style={{ textAlign: "center" }}>
        <Lock size={36} color={T.amber} style={{ marginBottom: 12 }} />
        <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 4 }}>Lakshmi locked</div>
        <div style={{ fontSize: 13, color: wrong ? T.red : T.dim, marginBottom: 18 }}>{wrong ? "Wrong PIN — try again" : "Enter your PIN"}</div>
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 22 }}>
          {Array.from({ length: pin.length }).map((_, i) => (
            <div key={i} style={{ width: 12, height: 12, borderRadius: "50%", background: i < entry.length ? T.amber : T.surface2 }} />))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,64px)", gap: 12, justifyContent: "center" }}>
          {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((d, i) => d === "" ? <div key={i} /> : (
            <button key={i} onClick={() => d === "⌫" ? setEntry(entry.slice(0, -1)) : press(d)}
              style={{ width: 64, height: 64, borderRadius: "50%", background: T.surface, border: "none", color: T.paper, fontSize: 22, cursor: "pointer" }}>{d}</button>))}
        </div>
      </div>
    </div>
  );
}

              : <div style={{ display: "flex", gap: 8 }}>

                    onChange={e => setNewPin(e.target.value.replace(/\D/g, "").slice(0, 6))} style={{ background: T.surface }} />

          </Card>
        </div>
      </div>
    </div>
  );

/* ── APP ── */

  const [tab, setTab] = useState("add");

  const [showSettings, setShowSettings] = useState(false);
  useEffect(() => {
    loadData().then(d => {
      const applied = applyRecurring(d);
      if (applied !== d) saveData(applied);
      setData(applied);
      if (applied.settings.pin) setLocked(true);
    });
  }, []);
  const persist = (d) => { setData(d); saveData(d); };

  const tabs = [
    ["add", "Add", Camera], ["dash", "Board", LayoutDashboard], ["exp", "Ledger", ReceiptText],
    ["prices", "Prices", Scale], ["budget", "Budget", Wallet], ["fuel", "Fuel", Fuel],
  ];

  if (!data) return <div style={{ minHeight: "100vh", background: T.bg, display: "grid", placeItems: "center" }}>
    <Loader2 size={28} color={T.amber} style={{ animation: "spin 1s linear infinite" }} /></div>;
  if (locked) return <PinGate pin={data.settings.pin} onUnlock={() => setLocked(false)} />;

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.paper, fontFamily: "-apple-system,'Segoe UI',sans-serif" }}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} input:focus,select:focus,textarea:focus{border-color:${T.amber}!important} button:focus-visible{outline:2px solid ${T.amber}}`}</style>
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "18px 14px 92px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>
              <span style={{ color: T.amber }}>◆</span> Lakshmi</div>
            <div style={{ fontSize: 11, color: T.dim, letterSpacing: ".12em", textTransform: "uppercase" }}>bills → wealth</div>
          </div>
          <button onClick={() => setShowSettings(true)} aria-label="Settings"
            style={{ background: "none", border: "none", color: T.dim, cursor: "pointer" }}><Settings2 size={20} /></button>
        </div>
        {tab === "add" && <AddTab data={data} persist={persist} />}
        {tab === "dash" && <DashboardTab data={data} />}
        {tab === "exp" && <LedgerTab data={data} persist={persist} />}
        {tab === "prices" && <PricesTab data={data} />}
        {tab === "budget" && <BudgetTab data={data} persist={persist} />}
        {tab === "fuel" && <FuelTab data={data} persist={persist} />}
      </div>
      {showSettings && <SettingsPanel data={data} persist={persist} onClose={() => setShowSettings(false)} />}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: T.surface, borderTop: `1px solid ${T.line}`, display: "flex", justifyContent: "space-around", padding: "8px 4px calc(8px + env(safe-area-inset-bottom))" }}>
        {tabs.map(([k, label, Icon]) => (
          <button key={k} onClick={() => setTab(k)} aria-label={label}
            style={{ background: "none", border: "none", cursor: "pointer", display: "grid", justifyItems: "center", gap: 3, color: tab === k ? T.amber : T.dim, minWidth: 50 }}>
            <Icon size={20} /><span style={{ fontSize: 10 }}>{label}</span>
          </button>))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
