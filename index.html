<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12130F">
<title>Lakshmi — private expense intelligence</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
:root{
  --ground:#12130F; --panel:#1B1C14; --panel2:#242519; --line:#32332A;
  --ink:#F2EDDF; --dim:#9A947F; --faint:#6C6753;
  --amber:#E2A63D; --amber2:#C98F2B; --green:#7FB069; --red:#E0653A; --teal:#6FA8A0; --violet:#A08FC0;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
[data-theme="light"]{
  --ground:#F5F2E8; --panel:#FFFFFF; --panel2:#EEEADC; --line:#DDD7C4;
  --ink:#23211A; --dim:#7A7462; --faint:#A39D89;
  --amber:#B07A17; --amber2:#8F6210; --green:#4E7D3A; --red:#C04A22; --teal:#3F7A72; --violet:#6D5B96;
  --shadow:0 8px 24px rgba(60,50,20,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--ground);color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  min-height:100%;overscroll-behavior-y:none}
.fr{font-family:"Fraunces",Georgia,serif}
.mono{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace}
input,select,textarea,button{font-family:inherit;color:inherit}
input,select,textarea{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;font-size:15px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--amber)}
button{cursor:pointer;border:none;background:none;padding:0}
::placeholder{color:var(--faint)}
#app{max-width:520px;margin:0 auto;min-height:100vh;position:relative}
.hdr{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--ground) 88%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:calc(env(safe-area-inset-top,0px) + 10px) 18px 10px;
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.screen{padding:16px 16px calc(96px + env(safe-area-inset-bottom,0px));animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.card.hero{background:linear-gradient(160deg,var(--panel) 0%,var(--panel2) 100%);box-shadow:var(--shadow)}
.sec{margin-bottom:12px}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:4px 2px;cursor:pointer;user-select:none}
.sec-t{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);font-weight:600}
.chev{transition:transform .25s ease;color:var(--faint);font-size:12px}
.chev.open{transform:rotate(90deg)}
.collapse{overflow:hidden;transition:max-height .32s ease,opacity .28s ease}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:520px;margin:0 auto;
  background:color-mix(in srgb,var(--panel) 92%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-around;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom,0px))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;
  color:var(--faint);padding:4px 0;transition:color .2s}
.nav button.on{color:var(--amber)}
.fab{width:54px;height:54px;border-radius:50%;background:var(--amber);color:#1A1508;font-size:26px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(226,166,61,.4);
  transform:translateY(-14px);transition:transform .15s}
.fab:active{transform:translateY(-14px) scale(.92)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;
  border:1px solid var(--line);background:var(--panel2);font-size:12.5px;color:var(--dim);transition:all .15s}
.pill.on{background:var(--amber);color:#1A1508;border-color:var(--amber);font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;
  padding:12px 16px;font-size:14.5px;font-weight:600;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn.p{background:var(--amber);color:#1A1508}
.btn.g{background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
.btn.d{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn.full{width:100%}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.kv{font-size:12px;color:var(--dim)}
.big{font-size:26px;font-weight:600}
.bar{height:7px;border-radius:99px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;border-radius:99px;background:var(--amber);transition:width .5s ease}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;animation:fadeUp .2s ease;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;max-width:520px;margin:0 auto;
  background:var(--panel);border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;
  padding:14px 18px calc(20px + env(safe-area-inset-bottom,0px));max-height:88vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.3,1.1,.4,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.handle{width:38px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 12px}
.receipt{background:#FCF8EC;color:#262215;border-radius:6px;padding:16px 14px;font-family:"IBM Plex Mono",monospace;
  font-size:12.5px;box-shadow:var(--shadow);position:relative}
.receipt:before,.receipt:after{content:"";position:absolute;left:0;right:0;height:8px;
  background-image:radial-gradient(circle at 6px -2px,transparent 6px,#FCF8EC 6.5px);background-size:14px 8px}
.receipt:before{top:-7px;transform:rotate(180deg)}
.receipt:after{bottom:-7px}
.tag{font-size:10.5px;padding:3px 8px;border-radius:6px;font-weight:600;letter-spacing:.02em}
.tag.ok{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
.tag.warn{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.tag.bad{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.tag.mut{background:var(--panel2);color:var(--dim)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .d{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:12.5px;color:var(--dim);position:relative;border:1px solid transparent}
.cal .d.cur{border-color:var(--amber);color:var(--ink);font-weight:600}
.cal .d.sel{background:var(--panel2);color:var(--ink)}
.cal .dots{display:flex;gap:2px;position:absolute;bottom:4px}
.cal .dot{width:4px;height:4px;border-radius:50%}
.list-it{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line)}
.list-it:last-child{border-bottom:none}
.ico{width:34px;height:34px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.score-ring{position:relative;width:112px;height:112px;flex-shrink:0}
.score-ring .n{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hint{font-size:12px;color:var(--faint)}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:2px;margin-bottom:14px}
.seg button{flex:1;padding:8px 4px;border-radius:9px;font-size:12.5px;color:var(--dim);font-weight:600}
.seg button.on{background:var(--amber);color:#1A1508}
.fade-num{animation:pop .35s ease}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;
const RC = window.Recharts || {};
const { ResponsiveContainer, AreaChart, Area, BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, CartesianGrid, Cell, PieChart, Pie, ReferenceLine } = RC;

/* ───────── constants & helpers ───────── */
const CATS = ["Groceries","Rent","Mortgage","Utilities","Dining","Fuel","Household","Health","Insurance","Subscriptions","Shopping","Transport","Entertainment","Education","Personal","India","Other"];
const CAT_ICO = {Groceries:"🥬",Rent:"🏠",Mortgage:"🏦",Utilities:"💡",Dining:"🍽️",Fuel:"⛽",Household:"🧺",Health:"🩺",Insurance:"🛡️",Subscriptions:"🔁",Shopping:"🛍️",Transport:"🚌",Entertainment:"🎬",Education:"📚",Personal:"🌿",India:"🇮🇳",Other:"◇"};
const FREQS = [["weekly","Weekly"],["biweekly","Bi-weekly"],["semimonthly","Semi-monthly"],["monthly","Monthly"],["quarterly","Quarterly"],["annual","Annual"]];
const SRCS = [["bank","Bank account"],["card","Credit card"],["cash","Cash"],["other","Other"]];
const fmt = (n, d=2) => (isFinite(+n)?+n:0).toLocaleString("en-CA",{style:"currency",currency:"CAD",minimumFractionDigits:d,maximumFractionDigits:d});
const fmt0 = n => fmt(n,0);
const pad = n => String(n).padStart(2,"0");
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const thisMonth = () => todayISO().slice(0,7);
const ym = d => (d||"").slice(0,7);
const dim = mk => { const [y,m]=mk.split("-").map(Number); return new Date(y,m,0).getDate(); };
const addDays = (iso,n) => { const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const addMonths = (mk,n) => { const [y,m]=mk.split("-").map(Number); const d=new Date(y,m-1+n,1); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; };
const monthLabel = mk => new Date(mk+"-02T12:00:00").toLocaleDateString("en-CA",{month:"long",year:"numeric"});
const shortDate = iso => new Date(iso+"T12:00:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"});
const lastMonths = n => { let out=[],mk=thisMonth(); for(let i=n-1;i>=0;i--) out.push(addMonths(mk,-i)); return out; };
const uid = () => crypto.randomUUID();
const clamp = (n,a,b) => Math.max(a,Math.min(b,n));
const haptic = ms => { try{ navigator.vibrate && navigator.vibrate(ms||8); }catch{} };

/* ───────── storage: v2 with v1 migration ───────── */
const KEY = "lakshmi-v2", OLD = ["lakshmi-v1","finledger-v2","finledger-v1"];
const emptyData = { v:2, expenses:[], fuel:[], budgets:{}, recurring:[], cards:[], settlements:[], receivables:[], incomes:[],
  settings:{ theme:"dark", inrRate:62, indiaMonthlyINR:0, savingsGoal:1000, cashOnHand:0, pin:"", payslip:null } };
function migrateV1(d){
  const s = d.settings||{};
  const incomes = (s.incomes||[]).map(i => ({ id:i.id||uid(), name:i.name||"Salary", type:"recurring",
    net:+i.amount||0, freq:i.freq||"biweekly", nextPay:"", overrides:{} }));
  if (!incomes.length && +s.salary>0) incomes.push({ id:uid(), name:"Primary salary", type:"recurring",
    net:Math.round((+s.salary)/26), freq:"biweekly", nextPay:"", overrides:{} });
  const recurring = (d.recurring||[]).map(r => ({ id:r.id||uid(), name:r.store||r.name||"Fixed expense",
    amount:+r.total||+r.amount||0, category:r.category||"Other", freq:"monthly", start:thisMonth()+"-01",
    paySource:"bank", cardId:"", reminderDays:3, overrides:{} }));
  return { ...emptyData, expenses:d.expenses||[], fuel:d.fuel||[], budgets:d.budgets||{}, recurring, incomes,
    settings:{ ...emptyData.settings, inrRate:+s.inrRate||62, indiaMonthlyINR:+s.indiaMonthlyINR||0,
      savingsGoal:+s.savingsGoal||1000, pin:s.pin||"" } };
}
function loadData(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ const d=JSON.parse(raw);
    return { ...emptyData, ...d, settings:{...emptyData.settings, ...d.settings} }; } }catch{}
  for (const k of OLD){ try{ const raw=localStorage.getItem(k); if(raw) return migrateV1(JSON.parse(raw)); }catch{} }
  return JSON.parse(JSON.stringify(emptyData));
}
const saveData = d => { try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){ console.error(e); } };

/* ───────── AI: your key, on this device only. Two call sites, capped & metered ───────── */
const AI_KEY = "lakshmi-ai", USE_KEY = "lakshmi-ai-usage";
const getAI = () => { try{ return JSON.parse(localStorage.getItem(AI_KEY))||{}; }catch{ return {}; } };
const setAI = c => localStorage.setItem(AI_KEY, JSON.stringify(c));
const PRICE = { openai:{i:0.15,o:0.60}, anthropic:{i:1.0,o:5.0} }; // $/M tokens (approx; check provider pages)
function meter(provider, inTok, outTok){
  try{ const u=JSON.parse(localStorage.getItem(USE_KEY)||"{}"); const mk=thisMonth();
    const m=u[mk]||{calls:0,cost:0}; const p=PRICE[provider]||PRICE.openai;
    m.calls++; m.cost += (inTok*p.i + outTok*p.o)/1e6; u[mk]=m;
    localStorage.setItem(USE_KEY, JSON.stringify(u)); }catch{}
}
const usage = () => { try{ return (JSON.parse(localStorage.getItem(USE_KEY)||"{}")[thisMonth()])||{calls:0,cost:0}; }catch{ return {calls:0,cost:0}; } };
/* downscale images before sending — the single biggest AI cost saver */
function shrink(dataUrl, maxSide=1024, q=0.72){
  return new Promise(res => { const img=new Image();
    img.onload=()=>{ const r=Math.min(1, maxSide/Math.max(img.width,img.height));
      const c=document.createElement("canvas"); c.width=Math.round(img.width*r); c.height=Math.round(img.height*r);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",q)); };
    img.onerror=()=>res(dataUrl); img.src=dataUrl; });
}
async function askAI(content, maxTokens=700){
  const { provider="openai", key="" } = getAI();
  if(!key) throw new Error("Add your AI key first: gear icon → AI settings");
  const est = c => Math.ceil(c.reduce((a,b)=> a + (b.type==="image"?1100:(b.text||"").length/4), 0));
  let out="";
  if (provider==="openai"){
    const res = await fetch("https://api.openai.com/v1/chat/completions",{ method:"POST",
      headers:{ "Content-Type":"application/json", Authorization:`Bearer ${key}` },
      body:JSON.stringify({ model:"gpt-4o-mini", max_tokens:maxTokens,
        messages:[{ role:"user", content:content.map(b => b.type==="image"
          ? { type:"image_url", image_url:{ url:`data:${b.media};base64,${b.data}` } }
          : { type:"text", text:b.text }) }] }) });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message||"OpenAI error");
    out = d.choices?.[0]?.message?.content||"";
  } else {
    const res = await fetch("https://api.anthropic.com/v1/messages",{ method:"POST",
      headers:{ "Content-Type":"application/json", "x-api-key":key,
        "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body:JSON.stringify({ model:"claude-haiku-4-5", max_tokens:maxTokens,
        messages:[{ role:"user", content:content.map(b => b.type==="image"
          ? { type:"image", source:{ type:"base64", media_type:b.media, data:b.data } }
          : { type:"text", text:b.text }) }] }) });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message||"AI error");
    out = (d.content||[]).map(x=>x.text||"").join("");
  }
  meter(provider, est(content), Math.ceil(out.length/4));
  return out;
}
const parseJSON = t => { const m=t.match(/\{[\s\S]*\}|\[[\s\S]*\]/); return JSON.parse(m?m[0]:t); };

/* prompts: compact by design (input tokens cost money too) */
const SCAN_PROMPT = `Read this receipt. Reply ONLY minified JSON:
{"kind":"fuel"|"expense","store":"","date":"YYYY-MM-DD","category":"<one of: ${CATS.join("|")}>","subtotal":0,"tax":0,"total":0,"litres":0,"fuelType":"","items":[{"name":"","qty":1,"lineTotal":0}]}
kind=fuel only for gas-station fuel. Max 12 items; merge tiny ones. If unsure of date use "".`;
const PAYSLIP_PROMPT = `Read this payslip. Reply ONLY minified JSON:
{"gross":0,"fedTax":0,"provTax":0,"cpp":0,"ei":0,"pension":0,"otherDeductions":0,"net":0,"payFreq":"weekly|biweekly|semimonthly|monthly","employer":""}
Amounts are for this single pay period. Combine taxes if not split.`;

/* ───────── local analytics engine (zero AI tokens) ───────── */
const isSettled = e => e.kind === "settlement";
const monthExp = (data, mk) => data.expenses.filter(e => ym(e.date)===mk && !isSettled(e));
const catSpend = (data, mk) => { const o={}; monthExp(data,mk).forEach(e => { o[e.category]=(o[e.category]||0)+(+e.total||0); }); return o; };
const totSpend = (data, mk) => monthExp(data,mk).reduce((a,e)=>a+(+e.total||0),0);

/* recurring occurrences in a month (fixed bills, subscriptions, rent, EMI…) */
function occurrences(rec, mk){
  const out=[], start=rec.start||mk+"-01", sd=new Date(start+"T12:00:00");
  const push = iso => { if (ym(iso)===mk) out.push(iso); };
  if (rec.freq==="monthly"){ push(`${mk}-${pad(Math.min(sd.getDate(), dim(mk)))}`); }
  else if (rec.freq==="semimonthly"){ push(`${mk}-01`); push(`${mk}-15`); }
  else if (rec.freq==="quarterly" || rec.freq==="annual"){
    const step = rec.freq==="quarterly"?3:12;
    const diff = (parseInt(mk)*12+parseInt(mk.slice(5))) - (sd.getFullYear()*12+sd.getMonth()+1);
    if (diff>=0 && diff%step===0) push(`${mk}-${pad(Math.min(sd.getDate(), dim(mk)))}`);
  } else { /* weekly / biweekly */
    const step = rec.freq==="weekly"?7:14, first=new Date(mk+"-01T12:00:00");
    let d=new Date(sd); const ms=step*864e5;
    if (d<first) d=new Date(d.getTime()+Math.ceil((first-d)/ms)*ms);
    while (ym(d.toISOString().slice(0,10))===mk){ push(d.toISOString().slice(0,10)); d=new Date(d.getTime()+ms); }
  }
  return out;
}
const recAmount = (rec, mk) => { const o=rec.overrides?.[mk]; return o&&o.amount!=null ? +o.amount : +rec.amount||0; };
const recStatus = (rec, mk, iso) => {
  const o=rec.overrides?.[mk]||{}; if (o.status) return o.status;
  return iso < todayISO() ? "missed" : "upcoming";
};
/* every dated obligation in a month: recurring + card due dates */
function monthItems(data, mk){
  const items=[];
  data.recurring.forEach(r => occurrences(r,mk).forEach(iso => {
    const o=r.overrides?.[mk]||{};
    items.push({ type:"rec", id:r.id, name:r.name, category:r.category, ico:CAT_ICO[r.category]||"◇",
      date:o.snooze||iso, amount:recAmount(r,mk), status:recStatus(r,mk,o.snooze||iso),
      paySource:r.paySource, cardId:r.cardId, reminderDays:r.reminderDays??3 });
  }));
  data.cards.forEach(c => {
    const iso=`${mk}-${pad(Math.min(+c.dueDay||21, dim(mk)))}`;
    const bill=(c.bills||{})[mk]; const st=(c.paidMonths||{})[mk]?"paid":(iso<todayISO()?"missed":"upcoming");
    items.push({ type:"card", id:c.id, name:`${c.name} bill`, category:"Card payment", ico:"💳",
      date:iso, amount:bill!=null?+bill:+c.currentBill||0, minPay:+c.minPayment||0, status:st, reminderDays:c.reminderDays??3 });
  });
  const ind=(+data.settings.indiaMonthlyINR||0)/(+data.settings.inrRate||1);
  if (ind>0) items.push({ type:"india", id:"india", name:"India transfer", category:"India", ico:"🇮🇳",
    date:`${mk}-05`, amount:ind, status:"upcoming", reminderDays:3 });
  return items.sort((a,b)=>a.date<b.date?-1:1);
}
/* income events in a month, honouring per-event overrides (delayed / skipped / edited) */
function incomeEvents(data, mk){
  const out=[];
  data.incomes.forEach(s => {
    if (s.type==="one"){ if (ym(s.date)===mk) out.push({ id:s.id, k:s.id+s.date, name:s.name, date:s.date, amount:+s.net||0, one:true }); return; }
    if (!s.nextPay) return;
    const step = s.freq==="weekly"?7 : s.freq==="biweekly"?14 : 0;
    let dates=[];
    if (step){ let d=s.nextPay;
      while (ym(d)>mk) d=addDays(d,-step);
      while (ym(d)<mk) d=addDays(d,step);
      while (ym(d)===mk){ dates.push(d); d=addDays(d,step); } }
    else if (s.freq==="semimonthly") dates=[`${mk}-15`,`${mk}-${dim(mk)===31?"31":pad(dim(mk))}`];
    else dates=[`${mk}-${pad(Math.min(new Date((s.nextPay||mk+"-28")+"T12:00:00").getDate(), dim(mk)))}`];
    dates.forEach(d => { const o=(s.overrides||{})[d]||{};
      if (o.skip) return;
      out.push({ id:s.id, k:s.id+d, name:s.name, date:o.moveTo||d, amount:o.amount!=null?+o.amount:+s.net||0 }); });
  });
  return out.sort((a,b)=>a.date<b.date?-1:1);
}
const monthIncome = (data, mk) => incomeEvents(data,mk).reduce((a,e)=>a+e.amount,0);
/* signature: projected cash ribbon through the month */
function projection(data, mk){
  const days=dim(mk), today=todayISO(), start=+data.settings.cashOnHand||0;
  const inflow={}, outflow={};
  incomeEvents(data,mk).forEach(e => inflow[e.date]=(inflow[e.date]||0)+e.amount);
  monthItems(data,mk).forEach(it => { if(it.status!=="skipped"&&it.status!=="paid") outflow[it.date]=(outflow[it.date]||0)+it.amount; });
  /* daily variable-spend pace from budgets not yet spent */
  const spent=catSpend(data,mk); const fixedCats=new Set(data.recurring.map(r=>r.category));
  let varBudget=0; Object.entries(data.budgets).forEach(([c,b])=>{ if(!fixedCats.has(c)&&c!=="Rent") varBudget+=Math.max(0,(+b||0)-(spent[c]||0)); });
  const dayN=Math.min(+today.slice(8,10), days), leftDays=Math.max(1,days-dayN);
  const pace=varBudget/leftDays;
  let bal=start, pts=[];
  for(let d=1; d<=days; d++){
    const iso=`${mk}-${pad(d)}`;
    bal += (inflow[iso]||0) - (outflow[iso]||0);
    if (iso>today) bal -= pace;
    pts.push({ d, iso, bal:Math.round(bal), future:iso>today });
  }
  return pts;
}
/* budget forecast per category */
function budgetView(data, mk){
  const spent=catSpend(data,mk), days=dim(mk);
  const dayN = mk===thisMonth() ? Math.max(1,+todayISO().slice(8,10)) : days;
  return Object.entries(data.budgets).filter(([,b])=>+b>0).map(([cat,b])=>{
    const a=spent[cat]||0, fc = mk===thisMonth() && dayN>=3 ? (a/dayN)*days : a;
    return { cat, budget:+b, actual:a, remaining:+b-a, forecast:Math.round(fc),
      state: a>+b?"bad" : fc>+b*1.02?"warn" : "ok" };
  }).sort((x,y)=>y.actual-x.actual);
}
/* fuel analytics — full-tank method */
function fuelStats(data){
  const f=[...data.fuel].sort((a,b)=>a.date<b.date?-1:1);
  const legs=[]; let lastFull=null;
  f.forEach(x=>{ if(!x.fullTank||!+x.odometer) return;
    if(lastFull&&+x.odometer>+lastFull.odometer){
      const km=+x.odometer-+lastFull.odometer, L=+x.litres||0;
      if(km>0&&L>0) legs.push({date:x.date, km, L, per:100*L/km}); }
    lastFull=x; });
  const byM={}; f.forEach(x=>{ const mk=ym(x.date); byM[mk]=byM[mk]||{cost:0,L:0,fills:0}; byM[mk].cost+=+x.cost||0; byM[mk].L+=+x.litres||0; byM[mk].fills++; });
  const kmByM={}; legs.forEach(l=>{ kmByM[ym(l.date)]=(kmByM[ym(l.date)]||0)+l.km; });
  const mileByM={}; legs.forEach(l=>{ const mk=ym(l.date); (mileByM[mk]=mileByM[mk]||[]).push(l.per); });
  const mAvg={}; Object.entries(mileByM).forEach(([mk,a])=>mAvg[mk]=a.reduce((x,y)=>x+y,0)/a.length);
  const ms=Object.entries(mAvg); let best=null,worst=null;
  ms.forEach(([mk,v])=>{ if(!best||v<best[1])best=[mk,v]; if(!worst||v>worst[1])worst=[mk,v]; });
  const vend={}; f.forEach(x=>{ const v=x.vendor||"Unknown"; vend[v]=vend[v]||{n:0,cost:0}; vend[v].n++; vend[v].cost+=+x.cost||0; });
  const totL=f.reduce((a,x)=>a+(+x.litres||0),0), totC=f.reduce((a,x)=>a+(+x.cost||0),0);
  return { legs, byM, kmByM, mAvg, best, worst, vend,
    avgFill: f.length?totC/f.length:0, avgL: totL?totC/totL:0 };
}
/* receivables */
const recvOut = r => Math.max(0, (+r.amount||0) - (r.repaid||[]).reduce((a,x)=>a+(+x.amount||0),0));
/* health score + proactive alerts */
function health(data, mk){
  const bv=budgetView(data,mk), inc=monthIncome(data,mk), sp=totSpend(data,mk);
  const over=bv.filter(b=>b.state==="bad").length, warn=bv.filter(b=>b.state==="warn").length;
  const sBudget = bv.length ? clamp(1-(over+0.5*warn)/bv.length,0,1) : 0.7;
  const sSave = inc>0 ? clamp((inc-sp)/inc/0.3,0,1) : 0.4;
  const pts=projection(data,mk); const minBal=Math.min(...pts.map(p=>p.bal));
  const sCash = minBal>=0 ? 1 : clamp(1+minBal/(inc||2000),0,1);
  const hist=lastMonths(4).slice(0,3).map(m=>totSpend(data,m)).filter(x=>x>0);
  const avg3=hist.length?hist.reduce((a,b)=>a+b,0)/hist.length:0;
  const sMom = avg3>0 ? clamp(1.5-sp/avg3,0,1) : 0.7;
  return Math.round(100*(0.35*sBudget+0.25*sSave+0.25*sCash+0.15*sMom));
}
function alerts(data, mk){
  const out=[], today=todayISO();
  monthItems(data,mk).forEach(it=>{
    if(it.status==="paid"||it.status==="skipped") return;
    const dd=Math.round((new Date(it.date)-new Date(today))/864e5);
    if(it.status==="missed") out.push({t:"bad", m:`${it.name} (${fmt0(it.amount)}) was due ${shortDate(it.date)} — mark paid or skip`});
    else if(dd<0) out.push({t:"warn", m:`${it.name} was due ${shortDate(it.date)} — ${fmt0(it.amount)}`});
    else if(dd<=(it.reminderDays??3)) out.push({t:"warn", m:`${it.name} due ${dd===0?"today":dd===1?"tomorrow":"in "+dd+" days"} — ${fmt0(it.amount)}`});
  });
  budgetView(data,mk).forEach(b=>{
    if(b.state==="bad") out.push({t:"bad", m:`${b.cat} over budget by ${fmt0(b.actual-b.budget)}`});
    else if(b.state==="warn") out.push({t:"warn", m:`${b.cat} projected to exceed budget by ${fmt0(b.forecast-b.budget)}`});
  });
  const pts=projection(data,mk), neg=pts.find(p=>p.future&&p.bal<0);
  if(neg) out.push({t:"bad", m:`Projected cash dips below zero around ${shortDate(neg.iso)} — review upcoming payments`});
  const owed=data.receivables.reduce((a,r)=>a+recvOut(r),0);
  if(owed>0) out.push({t:"warn", m:`Friends owe you ${fmt0(owed)}`});
  data.cards.forEach(c=>{ const prev=(c.bills||{})[addMonths(mk,-1)], cur=(c.bills||{})[mk]??+c.currentBill;
    if(prev>0&&cur>prev*1.25) out.push({t:"warn", m:`${c.name} bill up ${Math.round(100*(cur-prev)/prev)}% vs last month`}); });
  return out.slice(0,8);
}

/* ───────── ADD: camera / library / manual → smart classify ───────── */
function Add({ data, persist, done }){
  const [busy,setBusy]=useState(""); const [err,setErr]=useState("");
  const [draft,setDraft]=useState(null); // scanned result awaiting confirm
  const camRef=useRef(), libRef=useRef();
  const onPick = async (file) => {
    if(!file) return; setErr(""); setBusy("Reading your bill…");
    try{
      const raw = await new Promise((res,rej)=>{ const r=new FileReader();
        r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const small = await shrink(raw);           // ← token saver
      const b64 = small.split(",")[1];
      const txt = await askAI([{type:"image", media:"image/jpeg", data:b64},{type:"text", text:SCAN_PROMPT}], 700);
      const j = parseJSON(txt);
      j.date = j.date || todayISO();
      if (!CATS.includes(j.category)) j.category = j.kind==="fuel"?"Fuel":"Other";
      setDraft(j);
    }catch(e){ setErr(e.message||"Could not read that image"); }
    setBusy("");
  };
  if (draft?.kind==="fuel") return <FuelConfirm data={data} persist={persist} j={draft} done={done} back={()=>setDraft(null)}/>;
  if (draft) return <ExpConfirm data={data} persist={persist} j={draft} done={done} back={()=>setDraft(null)}/>;
  return <div className="screen">
    <div className="fr" style={{fontSize:22,margin:"6px 2px 16px"}}>Add a bill</div>
    {busy && <div className="card row"><span>⏳</span><span>{busy}</span></div>}
    {err && <div className="card" style={{borderColor:"var(--red)"}}><span className="tag bad">error</span> <span style={{fontSize:13.5}}>{err}</span></div>}
    <button className="card row full" style={{textAlign:"left"}} onClick={()=>camRef.current.click()}>
      <span className="ico" style={{fontSize:20}}>📷</span>
      <div style={{flex:1}}><div>Camera</div><div className="hint">Snap the receipt — AI reads it</div></div><span className="chev">▶</span></button>
    <button className="card row full" style={{textAlign:"left"}} onClick={()=>libRef.current.click()}>
      <span className="ico" style={{fontSize:20}}>🖼️</span>
      <div style={{flex:1}}><div>Photo library</div><div className="hint">Pick an existing photo</div></div><span className="chev">▶</span></button>
    <button className="card row full" style={{textAlign:"left"}} onClick={()=>setDraft({kind:"expense",manual:true,store:"",date:todayISO(),category:"Groceries",subtotal:0,tax:0,total:0,items:[]})}>
      <span className="ico" style={{fontSize:20}}>✏️</span>
      <div style={{flex:1}}><div>Manual entry</div><div className="hint">Type it in — no AI, no cost</div></div><span className="chev">▶</span></button>
    <input ref={camRef} type="file" accept="image/*" capture="environment" hidden onChange={e=>onPick(e.target.files[0])}/>
    <input ref={libRef} type="file" accept="image/*" hidden onChange={e=>onPick(e.target.files[0])}/>
    <div className="hint" style={{margin:"8px 4px"}}>Photos are shrunk on-device before the AI reads them — scans cost ≈ a tenth of a cent.</div>
  </div>;
}

    const exp={ id:uid(), store:f.store||"Expense", date:f.date, category:f.category,

      <div className="row" style={{fontWeight:600}}><span>TOTAL {f.currency}</span>
        <input value={f.total} inputMode="decimal" onChange={e=>upd("total",e.target.value)}
        style={{width:90,textAlign:"right",background:"transparent",border:"none",borderBottom:"1px dotted #999",borderRadius:0,padding:2,color:"inherit",fontFamily:"inherit",fontWeight:600}}/></div>
      {f.currency==="INR" && <div style={{fontSize:10.5,textAlign:"right"}}>≈ {fmt(cad)} CAD @ {rate}</div>}

/* Income: streams, payslip AI analysis, salary calendar, cash-flow dashboard */
function Income({ data, persist, mk }){
  const [edit,setEdit]=useState(null); const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
  const fileRef=useRef();
  const evs = incomeEvents(data,mk);
  const ps = data.settings.payslip;
  const flow = lastMonths(6).map(m=>{ const inc=monthIncome(data,m), sp=totSpend(data,m);
    const ind=(+data.settings.indiaMonthlyINR||0)/(+data.settings.inrRate||1);
    return { m:m.slice(5), income:Math.round(inc), expenses:Math.round(sp), net:Math.round(inc-sp), india:Math.round(ind) }; });
  const analysePayslip = async (file) => {
    if(!file) return; setErr(""); setBusy(true);
    try{
      const raw=await new Promise((res,rej)=>{const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);});
      const small=await shrink(raw); const b64=small.split(",")[1];
      const j=parseJSON(await askAI([{type:"image",media:"image/jpeg",data:b64},{type:"text",text:PAYSLIP_PROMPT}],400));
      const per={weekly:52,biweekly:26,semimonthly:24,monthly:12}[j.payFreq]||26;
      persist({...data, settings:{...data.settings, payslip:{...j, per,
        monthlyNet:Math.round(j.net*per/12), annualNet:Math.round(j.net*per),
        annualGross:Math.round(j.gross*per), taxRate:j.gross>0?Math.round(100*(j.gross-j.net)/j.gross):0 }}});
    }catch(e){ setErr(e.message||"Could not read payslip"); }
    setBusy(false);
  };
  const saveStream = s => { const arr=data.incomes.some(x=>x.id===s.id)
      ? data.incomes.map(x=>x.id===s.id?s:x) : [...data.incomes, s];
    persist({...data, incomes:arr}); setEdit(null); };
  const overrideEvent = (ev, patch) => {
    persist({...data, incomes:data.incomes.map(s=>s.id!==ev.id?s:

        <div><div className="hint">gross / yr</div><div className="mono">{fmt0(ps.annualGross)}</div></div>
        <div><div className="hint">CPP+EI / pay</div><div className="mono">{fmt0((+ps.cpp||0)+(+ps.ei||0))}</div></div>
        <div><div className="hint">pension</div><div className="mono">{fmt0(ps.pension)}</div></div>
      </div> : <div className="hint">Upload one sample payslip — the AI extracts gross, taxes, CPP, EI, pension and models your take-home. One small AI call (~half a cent).</div>}
      {err && <div className="tag bad" style={{marginTop:8}}>{err}</div>}
      <button className="btn g full" style={{marginTop:10}} disabled={busy} onClick={()=>fileRef.current.click()}>

    </Sec>
    <Sec title="Income streams" right={<button className="pill" onClick={()=>setEdit({id:uid(),name:"",type:"recurring",net:"",freq:"biweekly",nextPay:todayISO(),overrides:{}})}>+ add</button>}>
      {data.incomes.length===0 && <div className="hint">Add your salary — and your spouse's, side income or one-time bonuses.</div>}
      {data.incomes.map(s=><div key={s.id} className="list-it" onClick={()=>setEdit(s)} style={{cursor:"pointer"}}>
        <span className="ico">{s.type==="one"?"✨":"💼"}</span>

        ? <><Lbl>Date received</Lbl><input type="date" value={edit.date||todayISO()} onChange={e=>setEdit({...edit,date:e.target.value})}/></>
        : <><Lbl>Frequency</Lbl><Pills opts={FREQS.filter(f=>f[0]!=="quarterly"&&f[0]!=="annual")} val={edit.freq} onPick={v=>setEdit({...edit,freq:v})}/>
          <Lbl>Next pay date</Lbl><input type="date" value={edit.nextPay} onChange={e=>setEdit({...edit,nextPay:e.target.value})}/></>}
      <div className="row" style={{marginTop:14,gap:8}}>
        <button className="btn d" onClick={()=>{persist({...data,incomes:data.incomes.filter(x=>x.id!==edit.id)});setEdit(null);}}>Delete</button>
        <button className="btn p" style={{flex:1}} onClick={()=>saveStream({...edit,net:+edit.net||0})}>Save</button>

/* ───────── CALENDAR: month grid + upcoming, mark paid / snooze / edit ───────── */
function CalendarScr({ data, persist, mk, setMk }){
  const [sel,setSel]=useState(todayISO()); const [editIt,setEditIt]=useState(null); const [view,setView]=useState("month");
  const items=monthItems(data,mk), evs=incomeEvents(data,mk);
  const byDay={}; items.forEach(i=>(byDay[i.date]=byDay[i.date]||[]).push(i));
  evs.forEach(e=>(byDay[e.date]=byDay[e.date]||[]).push({type:"pay",name:e.name,date:e.date,amount:e.amount,ico:"📅",status:"income"}));
  const first=new Date(mk+"-01T12:00:00"), lead=first.getDay(), days=dim(mk);
  const setRecOverride=(it,patch,allFuture)=>{
    persist({...data, recurring:data.recurring.map(r=>{
      if(r.id!==it.id) return r;
      if(allFuture&&patch.amount!=null) return {...r, amount:+patch.amount, overrides:{...(r.overrides||{})}};
      return {...r, overrides:{...(r.overrides||{}), [mk]:{...((r.overrides||{})[mk]||{}), ...patch}}};
    })}); setEditIt(null);
  };
  const markPaid=(it)=>{
    if(it.type==="card"){ const c=data.cards.find(x=>x.id===it.id); if(c){
      persist({...data,
        settlements:[...data.settlements,{id:uid(),cardId:c.id,amount:it.amount,date:todayISO()}],
        expenses:[{id:uid(),kind:"settlement",store:`${c.name} bill payment`,date:todayISO(),category:"Card payment",total:it.amount,items:[],paySource:"bank",source:"settlement"},...data.expenses],
        cards:data.cards.map(x=>x.id!==c.id?x:{...x,paidMonths:{...(x.paidMonths||{}),[mk]:true}})}); } }
    else if(it.type==="rec"){ const r=data.recurring.find(x=>x.id===it.id); if(r){
      let d={...data, expenses:[{id:uid(),store:r.name,date:todayISO(),category:r.category,total:it.amount,subtotal:it.amount,tax:0,items:[],paySource:r.paySource,cardId:r.cardId,source:"recurring"},...data.expenses]};
      if(r.paySource==="card"&&r.cardId) d.cards=d.cards.map(c=>c.id!==r.cardId?c:{...c,bills:{...(c.bills||{}),[mk]:(((c.bills||{})[mk]) ?? (+c.currentBill||0))+it.amount}});
      d.recurring=d.recurring.map(x=>x.id!==r.id?x:{...x,overrides:{...(x.overrides||{}),[mk]:{...((x.overrides||{})[mk]||{}),status:"paid"}}});
      persist(d); } }
    haptic(15); setEditIt(null);
  };
  const dayList=(byDay[sel]||[]);
  const stCol={paid:"var(--green)",missed:"var(--red)",upcoming:"var(--amber)",skipped:"var(--faint)",income:"var(--teal)"};
  return <div className="screen">
    <div className="row" style={{marginBottom:10}}>
      <button className="pill" onClick={()=>setMk(addMonths(mk,-1))}>←</button>
      <span className="fr" style={{fontSize:18}}>{monthLabel(mk)}</span>
      <button className="pill" onClick={()=>setMk(addMonths(mk,1))}>→</button>
    </div>
    <div className="seg">{[["month","Month"],["list","Upcoming list"]].map(([v,l])=>
      <button key={v} className={view===v?"on":""} onClick={()=>setView(v)}>{l}</button>)}</div>
    {view==="month" && <>
      <div className="cal" style={{marginBottom:4}}>
        {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:"var(--faint)"}}>{d}</div>)}
      </div>
      <div className="cal card" style={{padding:10}}>
        {Array.from({length:lead}).map((_,i)=><div key={"x"+i}/>)}
        {Array.from({length:days}).map((_,i)=>{ const iso=`${mk}-${pad(i+1)}`; const its=byDay[iso]||[];
          return <button key={iso} className={"d"+(iso===todayISO()?" cur":"")+(iso===sel?" sel":"")} onClick={()=>{setSel(iso);haptic();}}>
            {i+1}
            <span className="dots">{its.slice(0,3).map((it,j)=><span key={j} className="dot" style={{background:stCol[it.status]||"var(--amber)"}}/>)}</span>
          </button>;})}
      </div>
      <div className="card">
        <div className="sec-t" style={{marginBottom:6}}>{shortDate(sel)}</div>
        {dayList.length===0 && <div className="hint">Nothing scheduled.</div>}
        {dayList.map((it,i)=><div key={i} className="list-it" style={{cursor:it.type!=="pay"?"pointer":"default"}}
          onClick={()=>it.type!=="pay"&&it.type!=="india"&&setEditIt(it)}>
          <span className="ico">{it.ico}</span>
          <div style={{flex:1}}><div style={{fontSize:14}}>{it.name}</div>
            <div className="hint">{it.category||""}{it.paySource?` · ${it.paySource}`:""}</div></div>
          <span className="mono" style={{color:stCol[it.status]}}>{it.status==="income"?"+":""}{fmt0(it.amount)}</span>
          <span className="tag mut">{it.status}</span>
        </div>)}
      </div>
    </>}
    {view==="list" && <div className="card">
      {items.filter(i=>i.status!=="paid"&&i.status!=="skipped").map((it,i)=><div key={i} className="list-it" style={{cursor:"pointer"}} onClick={()=>it.type!=="india"&&setEditIt(it)}>
        <span className="ico">{it.ico}</span>
        <div style={{flex:1}}><div style={{fontSize:14}}>{it.name}</div><div className="hint">{shortDate(it.date)} · {it.status}</div></div>
        <span className="mono">{fmt0(it.amount)}</span></div>)}
    </div>}
    {editIt && <Sheet onClose={()=>setEditIt(null)}>
      <div className="fr" style={{fontSize:18}}>{editIt.name}</div>
      <div className="hint" style={{margin:"4px 0 12px"}}>{shortDate(editIt.date)} · {fmt0(editIt.amount)}{editIt.minPay>0&&` · min ${fmt0(editIt.minPay)}`}</div>
      <button className="btn p full" onClick={()=>markPaid(editIt)} style={{marginBottom:8}}>Mark as paid{editIt.type==="rec"?" (logs the expense)":" (records settlement)"}</button>
      {editIt.type==="rec" && <>
        <div className="grid2" style={{marginBottom:8}}>
          <button className="btn g" onClick={()=>setRecOverride(editIt,{snooze:addDays(editIt.date,3)})}>Snooze 3 days</button>
          <button className="btn g" onClick={()=>setRecOverride(editIt,{status:"skipped"})}>Skip this month</button>
        </div>
        <Lbl>Change amount</Lbl>
        <EditAmt cur={editIt.amount} onThis={v=>setRecOverride(editIt,{amount:v})} onAll={v=>setRecOverride(editIt,{amount:v},true)}/>
      </>}
      {editIt.type==="card" && <div className="hint">Adjust this card's bill amount in Money → Cards.</div>}
    </Sheet>}
  </div>;
}
function EditAmt({ cur, onThis, onAll }){
  const [v,setV]=useState(cur);
  return <>
    <input inputMode="decimal" value={v} onChange={e=>setV(e.target.value)}/>
    <div className="grid2" style={{marginTop:8}}>
      <button className="btn g" onClick={()=>onThis(+v||0)}>This month only</button>
      <button className="btn g" onClick={()=>onAll(+v||0)}>All future months</button>
    </div>
  </>;
}

/* ───────── FUEL: vehicle analytics ───────── */
function Fuel({ data, mk }){
  const fs=fuelStats(data);
  const months=lastMonths(6);
  const trend=months.map(m=>({ m:m.slice(5), cost:Math.round((fs.byM[m]||{}).cost||0), km:Math.round(fs.kmByM[m]||0) }));
  const mil=months.map(m=>({ m:m.slice(5), v:fs.mAvg[m]?+fs.mAvg[m].toFixed(1):null })).filter(x=>x.v!=null);
  const fb=+data.budgets["Fuel"]||0, fa=(fs.byM[mk]||{}).cost||0;
  const vendors=Object.entries(fs.vend).sort((a,b)=>b[1].cost-a[1].cost).slice(0,5);
  return <div className="screen">
    <div className="card hero grid3">
      <div><div className="hint">avg / fill</div><div className="mono fade-num">{fmt0(fs.avgFill)}</div></div>
      <div><div className="hint">$ / litre</div><div className="mono fade-num">{fmt(fs.avgL)}</div></div>
      <div><div className="hint">km this mo.</div><div className="mono fade-num">{Math.round(fs.kmByM[mk]||0)}</div></div>
    </div>
    {fb>0 && <Sec title="Fuel budget">
      <div className="row" style={{marginBottom:5}}><span className="kv">this month</span><span className="mono kv">{fmt0(fa)} / {fmt0(fb)}</span></div>
      <div className="bar"><i style={{width:clamp(100*fa/fb,2,100)+"%",background:fa>fb?"var(--red)":"var(--green)"}}/></div>
    </Sec>}
    <Sec title="Cost & distance — 6 months">
      <Bars data={trend} keys={["cost"]} colors={["var(--amber)"]}/>
      <div className="hint">Distance uses full-tank odometer legs only — partial fills never distort mileage.</div>
    </Sec>
    {mil.length>1 && <Sec title="Mileage trend (L/100km — lower is better)">
      <div style={{height:120,margin:"6px -8px 0"}}><ResponsiveContainer width="100%" height="100%">
        <LineChart data={mil} margin={{top:6,right:10,left:10,bottom:0}}>
          <XAxis dataKey="m" tick={{fontSize:10,fill:"var(--faint)"}} axisLine={false} tickLine={false}/>
          <YAxis hide domain={["auto","auto"]}/><Tooltip contentStyle={tipStyle}/>
          <Line dataKey="v" stroke="var(--teal)" strokeWidth={2} dot={{r:3}}/>
        </LineChart></ResponsiveContainer></div>
      <div className="grid2" style={{marginTop:8}}>
        {fs.best && <div><div className="hint">best month</div><div className="mono">{fs.best[0].slice(5)} · {fs.best[1].toFixed(1)}</div></div>}
        {fs.worst && <div><div className="hint">thirstiest</div><div className="mono">{fs.worst[0].slice(5)} · {fs.worst[1].toFixed(1)}</div></div>}
      </div>
    </Sec>}
    {vendors.length>0 && <Sec title="Where you fill up" open0={false}>
      {vendors.map(([v,s])=><div key={v} className="list-it">
        <span style={{flex:1,fontSize:14}}>{v}</span><span className="hint">{s.n}×</span>
        <span className="mono">{fmt0(s.cost)}</span></div>)}
    </Sec>}
    {data.fuel.length===0 && <div className="hint" style={{margin:"8px 4px"}}>Scan a fuel receipt from the + button — it lands here with odometer and full-tank tracking.</div>}
  </div>;
}

/* ───────── SETTINGS sheet + PIN gate + export ───────── */
function Settings({ data, persist, onClose }){
  const s=data.settings, ai=getAI(), u=usage();
  const set=(k,v)=>persist({...data,settings:{...s,[k]:v}});
  const [prov,setProv]=useState(ai.provider||"openai"); const [key,setKey]=useState(ai.key||"");
  const exportCSV=()=>{
    const rows=[["date","store","category","total","tax","source","paySource","kind"],
      ...data.expenses.map(e=>[e.date,(e.store||"").replaceAll(",",";"),e.category,e.total,e.tax||0,e.source||"",e.paySource||"",e.kind||"expense"])];
    const blob=new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`lakshmi-${todayISO()}.csv`; a.click();
  };
  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(data,null,1)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`lakshmi-backup-${todayISO()}.json`; a.click();
  };
  const importRef=useRef();
  const importJSON=f=>{ if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.expenses) persist({...emptyData,...d,settings:{...emptyData.settings,...d.settings}}); alert("Backup restored."); }catch{ alert("Not a valid Lakshmi backup."); } };
    r.readAsText(f); };
  return <Sheet onClose={onClose}>
    <div className="fr" style={{fontSize:19,marginBottom:4}}>Settings</div>
    <div className="hint" style={{marginBottom:10}}>🔒 Everything here stays in this device's storage. Nothing syncs anywhere.</div>
    <Lbl>Theme</Lbl>
    <Pills opts={[["dark","Dark"],["light","Light"]]} val={s.theme} onPick={v=>set("theme",v)}/>
    <Lbl>AI for bill reading — your own key</Lbl>
    <Pills opts={[["openai","OpenAI (cheapest)"],["anthropic","Claude"]]} val={prov} onPick={setProv}/>
    <input style={{marginTop:8}} type="password" placeholder="Paste API key (sk-…)" value={key} onChange={e=>setKey(e.target.value)}/>
    <button className="btn g full" style={{marginTop:8}} onClick={()=>{setAI({provider:prov,key:key.trim()});haptic();alert("Key saved on this device.");}}>Save AI key</button>
    <div className="row card" style={{marginTop:10}}>
      <span className="kv">Est. AI spend this month</span>
      <span className="mono">{u.calls} calls · ${u.cost.toFixed(3)}</span>
    </div>
    <div className="grid2" style={{marginTop:4}}>
      <div><Lbl>INR rate (₹/CAD)</Lbl><input inputMode="decimal" value={s.inrRate} onChange={e=>set("inrRate",e.target.value)}/></div>
      <div><Lbl>India transfer ₹/mo</Lbl><input inputMode="decimal" value={s.indiaMonthlyINR} onChange={e=>set("indiaMonthlyINR",e.target.value)}/></div>
      <div><Lbl>Savings goal / mo</Lbl><input inputMode="decimal" value={s.savingsGoal} onChange={e=>set("savingsGoal",e.target.value)}/></div>
      <div><Lbl>App PIN (blank = off)</Lbl><input inputMode="numeric" value={s.pin} onChange={e=>set("pin",e.target.value)}/></div>
    </div>
    <Lbl>Your data, your hands</Lbl>
    <div className="grid3">
      <button className="btn g" onClick={exportCSV}>CSV</button>
      <button className="btn g" onClick={exportJSON}>Backup</button>
      <button className="btn g" onClick={()=>importRef.current.click()}>Restore</button>
    </div>
    <input ref={importRef} type="file" accept="application/json" hidden onChange={e=>importJSON(e.target.files[0])}/>
    <button className="btn d full" style={{marginTop:12}} onClick={()=>{ if(confirm("Erase ALL data on this device?")) persist(JSON.parse(JSON.stringify(emptyData))); }}>Erase all data</button>
  </Sheet>;
}
function PinGate({ pin, onOk }){
  const [v,setV]=useState("");
  useEffect(()=>{ if(v===pin) onOk(); },[v]);
  return <div className="screen" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"80vh"}}>
    <div style={{fontSize:34}}>🔒</div>
    <div className="fr" style={{fontSize:20,margin:"8px 0 16px"}}>Lakshmi</div>
    <input type="password" inputMode="numeric" placeholder="PIN" value={v} onChange={e=>setV(e.target.value)}
      style={{width:150,textAlign:"center",fontSize:20,letterSpacing:6}}/>
  </div>;
}

/* ───────── shell ───────── */
function App(){
  const [data,setData]=useState(loadData);
  const persist=d=>{ setData(d); saveData(d); };
  const [tab,setTab]=useState("home");
  const [mk,setMk]=useState(thisMonth());
  const [showSet,setShowSet]=useState(false);
  const [locked,setLocked]=useState(!!loadData().settings.pin);
  useEffect(()=>{ document.documentElement.dataset.theme=data.settings.theme||"dark"; },[data.settings.theme]);
  if (locked) return <PinGate pin={data.settings.pin} onOk={()=>setLocked(false)}/>;
  return <>
    <div className="hdr">
      <div className="row" style={{gap:9}}>
        <span style={{width:22,height:22,background:"var(--amber)",display:"inline-block",
          clipPath:"polygon(50% 0,100% 50%,50% 100%,0 50%)"}}/>
        <span className="fr" style={{fontSize:18,fontWeight:600}}>Lakshmi</span>
      </div>
      <button className="pill" onClick={()=>setShowSet(true)}>⚙️ Settings</button>
    </div>
    {tab==="home" && <Home data={data} persist={persist} mk={mk} openSettings={()=>setShowSet(true)}/>}
    {tab==="money" && <Money data={data} persist={persist} mk={mk}/>}
    {tab==="add" && <Add data={data} persist={persist} done={()=>setTab("home")}/>}
    {tab==="cal" && <CalendarScr data={data} persist={persist} mk={mk} setMk={setMk}/>}
    {tab==="fuel" && <Fuel data={data} mk={mk}/>}
    <div className="nav">
      <button className={tab==="home"?"on":""} onClick={()=>{setTab("home");haptic();}}><span style={{fontSize:18}}>◈</span>Home</button>
      <button className={tab==="money"?"on":""} onClick={()=>{setTab("money");haptic();}}><span style={{fontSize:18}}>⛁</span>Money</button>
      <button onClick={()=>{setTab("add");haptic(12);}}><span className="fab">+</span></button>
      <button className={tab==="cal"?"on":""} onClick={()=>{setTab("cal");haptic();}}><span style={{fontSize:18}}>▦</span>Calendar</button>
      <button className={tab==="fuel"?"on":""} onClick={()=>{setTab("fuel");haptic();}}><span style={{fontSize:18}}>⛽</span>Fuel</button>
    </div>
    {showSet && <Settings data={data} persist={persist} onClose={()=>setShowSet(false)}/>}
  </>;
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
